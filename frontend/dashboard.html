<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Orchestrator — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17; --surface: #111827; --surface-hover: #1a2234;
            --border: #1e293b; --border-light: #334155;
            --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
            --green: #10b981; --red: #ef4444; --amber: #f59e0b; --purple: #8b5cf6; --cyan: #06b6d4;
            --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
        }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); font-size: 13px; }
        .hidden { display: none !important; }

        /* Login */
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 30% 20%, var(--accent-glow), transparent 50%), var(--bg); }
        .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

        /* Form */
        input, select, textarea { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-sm { padding: 7px 16px; font-size: 11px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }

        /* Layout */
        .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 10; overflow-y: auto; }
        .main { margin-left: 220px; padding: 28px 32px; min-height: 100vh; }

        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 18px; cursor: pointer; border-radius: 8px; margin: 2px 10px; color: var(--text-dim); font-size: 12px; transition: all 0.15s; border: 1px solid transparent; }
        .nav-item:hover { background: var(--surface-hover); }
        .nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; border-color: rgba(59,130,246,0.13); }
        .nav-section { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 16px 18px 6px; font-weight: 600; }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .stat-card { display: flex; align-items: center; gap: 16px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
        .stat-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.08); }
        .stat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .stat-value { font-size: 22px; font-weight: 700; line-height: 1.1; }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }

        /* Badges */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 10px 14px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600; }
        td { padding: 12px 14px; border-bottom: 1px solid rgba(30,41,59,0.03); vertical-align: middle; }
        tr.clickable { cursor: pointer; transition: background 0.1s; }
        tr.clickable:hover { background: var(--surface-hover); }

        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 0 0 14px; font-weight: 600; }
        .page-title { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
        .page-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .grid-tasks { display: grid; grid-template-columns: 1fr 380px; gap: 14px; }

        .progress-bg { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

        .activity-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .activity-item + .activity-item { border-top: 1px solid rgba(30,41,59,0.03); }

        .msg { padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
        .msg-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); color: var(--red); }
        .msg-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.15); color: var(--green); }
        .msg-info { background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.13); color: var(--purple); }

        .score-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .score-bar-label { font-size: 10px; color: var(--text-muted); width: 100px; }
        .score-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
        .score-bar-fill { height: 100%; border-radius: 2px; }
        .score-bar-value { font-size: 10px; color: var(--text-dim); width: 30px; text-align: right; }

        .transition-btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; background: transparent; color: var(--text-dim); border: 1px solid var(--border); transition: all 0.15s; }
        .transition-btn:hover { border-color: var(--accent); color: var(--accent); }

        .rec-card { padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); background: var(--bg); }
        .rec-card.top { background: rgba(16,185,129,0.04); border-color: rgba(16,185,129,0.13); }

        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(30,41,59,0.05); font-size: 12px; }
        .detail-label { color: var(--text-muted); }
        .detail-value { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: var(--accent-glow); color: var(--accent); margin: 2px 2px; border: 1px solid rgba(59,130,246,0.15); }

        .empty-state { color: var(--text-muted); font-size: 12px; text-align: center; padding: 40px 20px; }

        @media (max-width: 1200px) {
            .grid-5 { grid-template-columns: repeat(3, 1fr); }
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .grid-tasks { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
    <div class="login-box">
        <div style="text-align:center;margin-bottom:32px">
            <div style="font-size:28px;margin-bottom:6px">⚡</div>
            <h1 style="font-size:18px;font-weight:700;letter-spacing:1px">WORK ORCHESTRATOR</h1>
            <p style="color:var(--text-muted);font-size:11px;margin-top:8px;letter-spacing:0.5px">AI-POWERED WORKFLOW ENGINE</p>
        </div>
        <div id="login-error" class="msg msg-error hidden"></div>
        <div style="margin-bottom:14px">
            <label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px">Username</label>
            <input id="login-user" placeholder="admin_user">
        </div>
        <div style="margin-bottom:24px">
            <label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px">Password</label>
            <input id="login-pass" type="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">SIGN IN →</button>
        <p style="text-align:center;color:var(--text-muted);font-size:10px;margin-top:20px;letter-spacing:0.3px">Test: admin_user / testpass123</p>
    </div>
</div>

<!-- APP -->
<div id="app-shell" class="hidden">
    <div class="sidebar">
        <div style="padding:22px 18px 20px;border-bottom:1px solid var(--border)">
            <div style="font-size:13px;font-weight:700;letter-spacing:1px">⚡ ORCHESTRATOR</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:0.5px">WORKFLOW ENGINE v1.0</div>
        </div>
        <div style="padding:10px 0;flex:1">
            <div class="nav-section">Overview</div>
            <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')"><span>◆</span> Dashboard</div>
            <div class="nav-section" style="margin-top:8px">Management</div>
            <div class="nav-item" data-page="tasks" onclick="switchPage('tasks')"><span>☰</span> Tasks</div>
            <div class="nav-item" data-page="users" onclick="switchPage('users')"><span>👥</span> Users</div>
            <div class="nav-item" data-page="teams" onclick="switchPage('teams')"><span>🏢</span> Teams</div>
            <div class="nav-item" data-page="organizations" onclick="switchPage('organizations')"><span>🏛</span> Organizations</div>
            <div class="nav-section" style="margin-top:8px">Configuration</div>
            <div class="nav-item" data-page="workflows" onclick="switchPage('workflows')"><span>🔀</span> Workflows</div>
            <div class="nav-item" data-page="transitions" onclick="switchPage('transitions')"><span>→</span> Transitions</div>
            <div class="nav-section" style="margin-top:8px">Intelligence</div>
            <div class="nav-item" data-page="ai" onclick="switchPage('ai')"><span>⚡</span> AI Engine</div>
            <div class="nav-section" style="margin-top:8px">History</div>
            <div class="nav-item" data-page="audit" onclick="switchPage('audit')"><span>📜</span> Audit Logs</div>
            <div class="nav-item" data-page="comments" onclick="switchPage('comments')"><span>💬</span> Comments</div>
        </div>
        <div style="padding:16px 18px;border-top:1px solid var(--border)">
            <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px"><span style="color:var(--green)">●</span> <span id="current-user"></span></div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px" id="current-role"></div>
            <button class="btn btn-outline" style="width:100%;padding:7px;font-size:10px;letter-spacing:0.5px" onclick="doLogout()">SIGN OUT</button>
        </div>
    </div>

    <div class="main">
        <div id="global-msg"></div>
        <div id="page-dashboard"></div>
        <div id="page-tasks" class="hidden"></div>
        <div id="page-users" class="hidden"></div>
        <div id="page-teams" class="hidden"></div>
        <div id="page-organizations" class="hidden"></div>
        <div id="page-workflows" class="hidden"></div>
        <div id="page-transitions" class="hidden"></div>
        <div id="page-ai" class="hidden"></div>
        <div id="page-audit" class="hidden"></div>
        <div id="page-comments" class="hidden"></div>
    </div>
</div>

<script>
const API = 'http://127.0.0.1:8000/api/v1';
let TOKEN = null;
let TASKS = [], WORKFLOWS = [], ALL_USERS = [], TEAMS = [], ORGS = [];
let CURRENT_USER = {};

const STATE_COLORS = { open:'#3b82f6', in_progress:'#f59e0b', review:'#8b5cf6', testing:'#06b6d4', done:'#10b981', cancelled:'#64748b' };
const PRIORITY_COLORS = { critical:'#ef4444', high:'#f59e0b', medium:'#3b82f6', low:'#64748b' };
const ROLE_COLORS = { admin:'#ef4444', manager:'#f59e0b', engineer:'#3b82f6', viewer:'#64748b' };
const ACTION_ICONS = { created:'🆕', state_changed:'🔄', assigned:'👤', commented:'💬', sla_breached:'🔴', updated:'📝', deleted:'🗑' };
const ALL_PAGES = ['dashboard','tasks','users','teams','organizations','workflows','transitions','ai','audit','comments'];

// --- API ---
async function apiCall(endpoint, method='GET', body=null) {
    const opts = { method, headers: { 'Content-Type':'application/json' } };
    if (TOKEN) opts.headers['Authorization'] = `Bearer ${TOKEN}`;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, opts);
    if (res.status === 401) { doLogout(); throw new Error('Unauthorized'); }
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(JSON.stringify(err));
    }
    return res.json();
}

// --- AUTH ---
async function doLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    try {
        const data = await apiCall('/auth/login/', 'POST', { username: user, password: pass });
        if (data.access) {
            TOKEN = data.access;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            await loadGlobalData();
            loadDashboard();
        } else { errEl.textContent = 'Invalid credentials'; errEl.classList.remove('hidden'); }
    } catch { errEl.textContent = 'Connection failed — is the server running?'; errEl.classList.remove('hidden'); }
}
function doLogout() { TOKEN = null; document.getElementById('app-shell').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden'); }
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });

// --- GLOBAL DATA ---
async function loadGlobalData() {
    try {
        const [me, taskData, wfData, userData, teamData, orgData] = await Promise.all([
            apiCall('/users/me/'), apiCall('/tasks/'), apiCall('/workflows/'),
            apiCall('/users/'), apiCall('/teams/'), apiCall('/organizations/')
        ]);
        CURRENT_USER = me;
        TASKS = taskData.results || [];
        WORKFLOWS = wfData.results || [];
        ALL_USERS = userData.results || [];
        TEAMS = teamData.results || [];
        ORGS = orgData.results || [];
        document.getElementById('current-user').textContent = me.username || '';
        document.getElementById('current-role').textContent = (me.role || '').toUpperCase();
    } catch (e) { showGlobalMsg('Failed to load data: ' + e.message, true); }
}

// --- NAV ---
function switchPage(page) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    ALL_PAGES.forEach(p => document.getElementById('page-'+p).classList.toggle('hidden', p !== page));
    const loaders = {
        dashboard: loadDashboard, tasks: loadTasksPage, users: loadUsersPage,
        teams: loadTeamsPage, organizations: loadOrgsPage, workflows: loadWorkflowsPage,
        transitions: loadTransitionsPage, ai: loadAIPage, audit: loadAuditPage, comments: loadCommentsPage
    };
    if (loaders[page]) loaders[page]();
}

// --- HELPERS ---
function badge(text, colorMap) {
    const c = (colorMap || {})[text] || '#64748b';
    return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30">${(text||'—').replace(/_/g,' ')}</span>`;
}
function statCard(icon, label, value, color, sub='', onclick='') {
    return `<div class="card stat-card" onclick="${onclick}" title="Click to view">
        <div class="stat-icon" style="background:${color}15;border:1px solid ${color}25">${icon}</div>
        <div><div class="stat-value">${value}</div><div class="stat-label">${label}</div>${sub ? `<div style="font-size:11px;color:${color};margin-top:2px">${sub}</div>`:''}</div>
    </div>`;
}
function showGlobalMsg(msg, isError) {
    document.getElementById('global-msg').innerHTML = `<div class="msg ${isError?'msg-error':'msg-success'}">${msg}</div>`;
    setTimeout(() => document.getElementById('global-msg').innerHTML = '', 4000);
}
function showMsg(elId, msg, isError) {
    const el = document.getElementById(elId);
    if (el) { el.innerHTML = `<div class="msg ${isError?'msg-error':'msg-success'}">${msg}</div>`; setTimeout(() => el.innerHTML = '', 3000); }
}
function timeAgo(ts) {
    const d = new Date(ts); const now = new Date(); const diff = (now - d) / 1000;
    if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago'; return Math.floor(diff/86400) + 'd ago';
}
function formatDate(ts) { return ts ? new Date(ts).toLocaleString() : '—'; }

// ========================================
// DASHBOARD
// ========================================
async function loadDashboard() {
    try {
        const [dash, perf, act] = await Promise.all([
            apiCall('/dashboard/overview/'), apiCall('/dashboard/team-performance/'), apiCall('/dashboard/activity/')
        ]);
        const o = dash.overview || {}; const s = dash.sla || {};
        const tp = perf.team_performance || []; const ac = act.recent_activity || [];
        const active = (o.total_tasks||0) - (o.by_state?.done||0) - (o.by_state?.cancelled||0);

        let html = `<div><h2 class="page-title">COMMAND CENTER</h2><p class="page-sub">Real-time overview · Click any stat to drill down</p></div>`;

        html += `<div class="grid-5" style="margin-top:20px">
            ${statCard('📋','Total Tasks', o.total_tasks||0, '#3b82f6', '', "switchPage('tasks')")}
            ${statCard('⚡','Active', active, '#f59e0b', `${o.last_7_days?.created||0} new this week`, "switchPage('tasks')")}
            ${statCard('✅','Completed', o.by_state?.done||0, '#10b981', `${o.last_7_days?.completed||0} this week`, "filterTasksByState('done')")}
            ${statCard('🔴','SLA Breached', s.breached||0, '#ef4444', s.breach_rate?s.breach_rate+'% rate':'', "filterTasksBySLA()")}
            ${statCard('👤','Unassigned', o.unassigned||0, '#8b5cf6', '', "filterTasksUnassigned()")}
        </div>`;

        // Charts row
        const states = Object.entries(o.by_state || {});
        const prios = Object.entries(o.by_priority || {});
        const maxPrio = Math.max(...prios.map(p=>p[1]), 1);

        let stateHTML = states.length ? states.map(([k,v]) => {
            const c = STATE_COLORS[k]||'#64748b';
            const total = states.reduce((a,b)=>a+b[1],0) || 1;
            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer" onclick="filterTasksByState('${k}')">
                <span style="font-size:10px;color:var(--text-muted);width:70px">${k.replace(/_/g,' ')}</span>
                <div style="flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden">
                    <div style="height:100%;width:${(v/total)*100}%;background:${c};border-radius:4px;min-width:${v>0?'24px':'0'};display:flex;align-items:center;padding-left:8px">
                        <span style="font-size:10px;color:#fff;font-weight:600">${v}</span>
                    </div>
                </div>
            </div>`;
        }).join('') : '<div class="empty-state">No data</div>';

        let prioHTML = prios.length ? prios.map(([k,v]) => {
            const c = PRIORITY_COLORS[k]||'#64748b';
            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer" onclick="filterTasksByPriority('${k}')">
                <span style="font-size:10px;color:var(--text-muted);width:60px">${k}</span>
                <div style="flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden">
                    <div style="height:100%;width:${(v/maxPrio)*100}%;background:${c};border-radius:4px;min-width:${v>0?'24px':'0'};display:flex;align-items:center;padding-left:8px">
                        <span style="font-size:10px;color:#fff;font-weight:600">${v}</span>
                    </div>
                </div>
            </div>`;
        }).join('') : '<div class="empty-state">No data</div>';

        let teamHTML = tp.length ? tp.map(p => {
            const c = p.workload_percentage >= 80 ? 'var(--red)' : p.workload_percentage >= 50 ? 'var(--amber)' : 'var(--green)';
            return `<div style="margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
                    <span>${p.username.replace(/_/g,' ')}</span>
                    <span style="color:${c}">${p.workload_percentage}% · ${p.active_tasks} active · ${p.completed_tasks} done</span>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(p.workload_percentage,100)}%;background:${c}"></div></div>
            </div>`;
        }).join('') : '<div class="empty-state">No team data</div>';

        html += `<div class="grid-3" style="margin-top:14px">
            <div class="card"><h3 class="section-title">Tasks by State</h3>${stateHTML}</div>
            <div class="card"><h3 class="section-title">Tasks by Priority</h3>${prioHTML}</div>
            <div class="card"><h3 class="section-title">Team Workload</h3>${teamHTML}</div>
        </div>`;

        // SLA Summary
        html += `<div class="grid-2" style="margin-top:14px">
            <div class="card">
                <h3 class="section-title">SLA Health</h3>
                <div class="grid-2" style="gap:12px">
                    <div class="detail-row"><span class="detail-label">Total Active</span><span class="detail-value">${s.total_active||0}</span></div>
                    <div class="detail-row"><span class="detail-label">Healthy</span><span class="detail-value" style="color:var(--green)">${s.healthy||0}</span></div>
                    <div class="detail-row"><span class="detail-label">At Risk (< 24h)</span><span class="detail-value" style="color:var(--amber)">${s.at_risk||0}</span></div>
                    <div class="detail-row"><span class="detail-label">Breached</span><span class="detail-value" style="color:var(--red)">${s.breached||0}</span></div>
                </div>
                <button class="btn btn-sm btn-outline" style="margin-top:14px;width:100%" onclick="runSLACheck()">🔍 RUN SLA CHECK</button>
            </div>
            <div class="card">
                <h3 class="section-title">Quick Stats</h3>
                <div class="detail-row"><span class="detail-label">Organization</span><span class="detail-value">${ORGS[0]?.name || '—'}</span></div>

// Dashboard click handlers
function filterTasksByState(state) { switchPage('tasks'); setTimeout(() => renderTasks(state, ''), 100); }
function filterTasksByPriority(p) { switchPage('tasks'); setTimeout(() => renderTasks('', p), 100); }
function filterTasksBySLA() { switchPage('tasks'); setTimeout(() => renderTasks('', '', true), 100); }
function filterTasksUnassigned() { switchPage('tasks'); setTimeout(() => renderTasks('', '', false, true), 100); }

// ========================================
// TASKS
// ========================================
async function loadTasksPage() { await loadGlobalData(); renderTasks(); }

function renderTasks(filterState='', filterPriority='', filterSLA=false, filterUnassigned=false) {
    let filtered = TASKS.filter(t => {
        if (filterState && t.current_state !== filterState) return false;
        if (filterPriority && t.priority !== filterPriority) return false;
        if (filterSLA && !t.sla_breached) return false;
        if (filterUnassigned && t.assigned_to_name) return false;
        return true;
    });

    let activeFilters = [];
    if (filterState) activeFilters.push(`State: ${filterState.replace(/_/g,' ')}`);
    if (filterPriority) activeFilters.push(`Priority: ${filterPriority}`);
    if (filterSLA) activeFilters.push('SLA Breached');
    if (filterUnassigned) activeFilters.push('Unassigned');

    let html = `<div style="display:flex;justify-content:space-between;align-items:center">
        <div><h2 class="page-title">TASKS</h2><p class="page-sub">${filtered.length} tasks${activeFilters.length ? ' · Filtered: '+activeFilters.join(', ') : ''}</p></div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-outline" onclick="renderTasks()">CLEAR FILTERS</button>
            <button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="toggleCreateTask()">+ NEW TASK</button>
        </div>
    </div>`;

    html += `<div id="create-task-form" class="card hidden" style="margin-top:14px"></div>`;

    html += `<div style="display:flex;gap:10px;margin:16px 0 14px;flex-wrap:wrap">
        <select id="f-state" style="width:150px" onchange="renderTasks(this.value, el('f-prio').value)">
            <option value="">All States</option>
            ${['open','in_progress','review','testing','done','cancelled'].map(s => `<option value="${s}" ${filterState===s?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}
        </select>
        <select id="f-prio" style="width:150px" onchange="renderTasks(el('f-state').value, this.value)">
            <option value="">All Priorities</option>
            ${['critical','high','medium','low'].map(p => `<option value="${p}" ${filterPriority===p?'selected':''}>${p}</option>`).join('')}
        </select>
    </div>`;

    html += `<div id="task-msg"></div>`;

    html += `<div id="tasks-layout"><div class="card"><table><thead><tr>
        ${['Key','Title','State','Priority','Type','Assignee','AI Score','Created'].map(h => `<th>${h}</th>`).join('')}
    </tr></thead><tbody>`;

    if (!filtered.length) {
        html += `<tr><td colspan="8" class="empty-state">No tasks found</td></tr>`;
    } else {
        filtered.forEach(t => {
            const ai = t.ai_priority_score != null ? `<span style="color:${t.ai_priority_score>=0.7?'var(--red)':t.ai_priority_score>=0.4?'var(--amber)':'var(--green)'};font-weight:600">${(t.ai_priority_score*100).toFixed(0)}%</span>` : '<span style="color:var(--text-muted)">—</span>';
            html += `<tr class="clickable" onclick="showTaskDetail('${t.id}')">
                <td style="color:var(--accent);font-weight:600;font-size:12px">${t.task_key}</td>
                <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
                <td>${badge(t.current_state, STATE_COLORS)}</td>
                <td>${badge(t.priority, PRIORITY_COLORS)}</td>
                <td style="color:var(--text-dim)">${t.task_type}</td>
                <td style="color:${t.assigned_to_name?'var(--text)':'var(--text-muted)'}">${t.assigned_to_name||'—'}</td>
                <td>${ai}</td>
                <td style="color:var(--text-muted);font-size:11px">${timeAgo(t.created_at)}</td>
            </tr>`;
        });
    }
    html += `</tbody></table></div></div>`;
    html += `<div id="task-detail-panel"></div>`;
    document.getElementById('page-tasks').innerHTML = html;
}

function el(id) { return document.getElementById(id); }

function toggleCreateTask() {
    const form = el('create-task-form');
    form.classList.toggle('hidden');
    if (!form.classList.contains('hidden')) {
        const wfOpts = WORKFLOWS.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
        const teamOpts = TEAMS.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        form.innerHTML = `<h3 style="font-size:12px;font-weight:600;margin:0 0 14px;color:var(--accent)">Create New Task</h3>
            <div class="grid-2" style="gap:12px">
                <div style="grid-column:1/-1"><input id="new-title" placeholder="Task title..."></div>
                <div style="grid-column:1/-1"><textarea id="new-desc" style="min-height:70px;resize:vertical" placeholder="Description..."></textarea></div>
                <select id="new-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select>
                <select id="new-type"><option value="task">Task</option><option value="bug">Bug</option><option value="feature">Feature</option><option value="improvement">Improvement</option></select>
                <select id="new-workflow"><option value="">Select workflow...</option>${wfOpts}</select>
                <select id="new-team"><option value="">No team</option>${teamOpts}</select>
                <div style="grid-column:1/-1"><input id="new-tags" placeholder="Tags (comma separated): backend, urgent, api"></div>
            </div>
            <div style="display:flex;gap:10px;margin-top:14px">
                <button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="createTask()">CREATE</button>
                <button class="btn btn-sm btn-outline" onclick="el('create-task-form').classList.add('hidden')">CANCEL</button>
            </div>`;
    }
}

async function createTask() {
    const wf = el('new-workflow').value || (WORKFLOWS[0]?.id || '');
    const tags = el('new-tags').value ? el('new-tags').value.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const body = { title: el('new-title').value, description: el('new-desc').value, priority: el('new-priority').value, task_type: el('new-type').value, workflow: wf, tags };
    const teamVal = el('new-team').value;
    if (teamVal) body.team = teamVal;
    try { await apiCall('/tasks/', 'POST', body); await loadGlobalData(); renderTasks(); showMsg('task-msg', 'Task created!', false); }
    catch (e) { showMsg('task-msg', 'Create failed: ' + e.message, true); }
}

async function showTaskDetail(taskId) {
    try {
        const task = TASKS.find(t => t.id === taskId);
        if (!task) return;
        const [trans, taskDetail] = await Promise.all([
            apiCall(`/tasks/${taskId}/available-transitions/`),
            apiCall(`/tasks/${taskId}/`)
        ]);
        const avail = trans.available_transitions || [];
        const engineers = ALL_USERS.filter(u => u.role === 'engineer' || u.role === 'manager');
        const userOpts = engineers.map(u => `<option value="${u.id}">${u.username} (${u.role}) — ${u.active_task_count} active</option>`).join('');
        const tags = (taskDetail.tags||[]).map(t => `<span class="tag">${t}</span>`).join(' ') || '—';

        let html = `<div class="card" style="margin-top:14px">
            <div style="display:flex;justify-content:space-between;align-items:start">
                <h3 style="font-size:14px;font-weight:700;color:var(--accent)">${task.task_key}</h3>
                <button class="btn btn-outline" style="padding:4px 12px;font-size:14px" onclick="el('task-detail-panel').innerHTML=''">×</button>
            </div>
            <p style="font-size:13px;font-weight:500;margin:8px 0 4px">${task.title}</p>
            ${taskDetail.description ? `<p style="font-size:11px;color:var(--text-dim);margin-bottom:14px">${taskDetail.description}</p>` : ''}

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">
                <div class="detail-row"><span class="detail-label">State</span><span>${badge(task.current_state, STATE_COLORS)}</span></div>
                <div class="detail-row"><span class="detail-label">Priority</span><span>${badge(task.priority, PRIORITY_COLORS)}</span></div>
                <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${task.task_type}</span></div>
                <div class="detail-row"><span class="detail-label">SLA</span><span style="color:${task.sla_breached?'var(--red)':'var(--green)'}">${task.sla_breached?'BREACHED':'OK'}</span></div>
                <div class="detail-row"><span class="detail-label">Assignee</span><span class="detail-value" style="color:${task.assigned_to_name?'var(--text)':'var(--text-muted)'}">${task.assigned_to_name||'Unassigned'}</span></div>
                <div class="detail-row"><span class="detail-label">Created by</span><span class="detail-value">${task.created_by_name||'—'}</span></div>
                <div class="detail-row"><span class="detail-label">AI Score</span><span class="detail-value">${task.ai_priority_score!=null?(task.ai_priority_score*100).toFixed(0)+'%':'—'}</span></div>
                <div class="detail-row"><span class="detail-label">Est. Hours</span><span class="detail-value">${taskDetail.ai_estimated_hours||'—'}</span></div>
                <div class="detail-row"><span class="detail-label">Due Date</span><span class="detail-value">${taskDetail.due_date?formatDate(taskDetail.due_date):'Not set'}</span></div>
                <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${formatDate(task.created_at)}</span></div>
            </div>
            <div style="margin-top:10px"><span class="detail-label" style="font-size:11px">Tags: </span>${tags}</div>

            <!-- ASSIGN -->
            <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
                <h4 class="section-title">Assign Task</h4>
                <div style="display:flex;gap:8px">
                    <select id="assign-user" style="flex:1"><option value="">Select engineer...</option>${userOpts}</select>
                    <button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="doAssign('${taskId}')">ASSIGN</button>
                </div>
                <div id="assign-msg" style="margin-top:8px"></div>
            </div>`;

        // TRANSITIONS
        if (avail.length > 0) {
            html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
                <h4 class="section-title">Transition State</h4>
                <div style="display:flex;flex-wrap:wrap;gap:6px">
                    ${avail.map(t => `<button class="transition-btn" onclick="doTransition('${taskId}','${t.to_state}')">${t.to_state.replace(/_/g,' ')}</button>`).join('')}
                </div>
            </div>`;
        }

        // COMMENTS
        const comments = taskDetail.comments || [];
        html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <h4 class="section-title">Comments (${comments.length})</h4>
            ${comments.map(c => `<div style="padding:8px 0;border-bottom:1px solid rgba(30,41,59,0.05)">
                <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px"><span style="color:var(--accent);font-weight:600">${c.author_name}</span><span style="color:var(--text-muted)">${timeAgo(c.created_at)}</span></div>
                <div style="font-size:12px;color:var(--text-dim)">${c.content}</div>
            </div>`).join('') || '<div style="color:var(--text-muted);font-size:11px;padding:8px 0">No comments yet</div>'}
            <div style="display:flex;gap:8px;margin-top:10px">
                <input id="new-comment" style="flex:1" placeholder="Add a comment...">
                <button class="btn btn-sm" style="background:var(--cyan);color:#fff" onclick="addComment('${taskId}')">POST</button>
            </div>
        </div>`;

        html += `</div>`;
        el('task-detail-panel').innerHTML = html;
    } catch (e) { showMsg('task-msg', 'Failed to load task detail', true); }
}

async function doAssign(taskId) {
    const userId = el('assign-user').value;
    if (!userId) { showMsg('assign-msg','Select an engineer first',true); return; }
    try { await apiCall(`/tasks/${taskId}/assign/`,'POST',{user_id:userId,reason:'Assigned via dashboard'}); showMsg('assign-msg','Assigned!',false); await loadGlobalData(); setTimeout(()=>showTaskDetail(taskId),300); }
    catch(e) { showMsg('assign-msg','Failed: '+e.message,true); }
}

async function doTransition(taskId, toState) {
    const reason = prompt('Reason for transition (optional):') || '';
    try { await apiCall(`/tasks/${taskId}/transition/`,'POST',{to_state:toState,reason}); showMsg('task-msg',`→ ${toState.replace(/_/g,' ')}`,false); await loadGlobalData(); renderTasks(); }
    catch(e) { showMsg('task-msg','Transition failed: '+e.message,true); }
}

async function addComment(taskId) {
    const content = el('new-comment').value;
    if (!content) return;
    try { await apiCall('/comments/','POST',{task:taskId,content}); showTaskDetail(taskId); }
    catch(e) { showMsg('task-msg','Comment failed',true); }
}

async function loadWorkflowsPage() {
    await loadGlobalData();
    let html = `<div><h2 class="page-title">WORKFLOWS</h2><p class="page-sub">State machine configurations</p></div>`;
    html += `<div style="margin-top:20px">`;
    WORKFLOWS.forEach(w => {
        const statesHTML = (w.allowed_states||[]).map((s,i) => {
            const c = STATE_COLORS[s] || '#64748b';
            const isFinal = (w.final_states||[]).includes(s);
            const isInitial = w.initial_state === s;
            let label = s.replace(/_/g,' ');
            if (isInitial) label = '▶ ' + label;
            if (isFinal) label += ' ■';
            return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30">${label}</span>`;
        }).join(' <span style="color:var(--text-muted)">→</span> ');

        const transHTML = (w.transitions||[]).map(t => {
            const roles = (t.allowed_roles||[]).map(r => `<span class="tag" style="background:${ROLE_COLORS[r]}15;color:${ROLE_COLORS[r]};border-color:${ROLE_COLORS[r]}25">${r}</span>`).join(' ');
            return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(30,41,59,0.05);font-size:11px">
                <span style="color:${STATE_COLORS[t.from_state]||'var(--text-dim)'};width:80px">${t.from_state.replace(/_/g,' ')}</span>
                <span style="color:var(--text-muted)">→</span>
                <span style="color:${STATE_COLORS[t.to_state]||'var(--text-dim)'};width:80px">${t.to_state.replace(/_/g,' ')}</span>
                <span style="flex:1">${roles}</span>
            </div>`;
        }).join('');

        html += `<div class="card" style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
                <h3 style="font-size:14px;font-weight:600">${w.name}</h3>
                ${w.is_default ? '<span class="badge" style="background:var(--green)18;color:var(--green);border:1px solid var(--green)30">DEFAULT</span>' : ''}
            </div>
            <div style="margin-bottom:14px"><span class="section-title" style="margin-bottom:8px;display:block">States (▶ initial · ■ final)</span>${statesHTML}</div>
            <div><span class="section-title" style="margin-bottom:8px;display:block">Transition Rules (${w.transitions?.length || 0})</span>${transHTML || '<div class="empty-state">No transitions</div>'}</div>
        </div>`;
    });
    html += `</div>`;
    el('page-workflows').innerHTML = html;
}

// ========================================
async function loadTransitionsPage() {
    try {
        const data = await apiCall('/transitions/');
        const transitions = data.results || [];
        let html = `<div><h2 class="page-title">TRANSITION RULES</h2><p class="page-sub">${transitions.length} rules defined</p></div>`;
        html += `<div class="card" style="margin-top:20px"><table><thead><tr>
            ${['From State','','To State','Allowed Roles','Workflow'].map(h=>`<th>${h}</th>`).join('')}
        </tr></thead><tbody>`;
        transitions.forEach(t => {
            const wf = WORKFLOWS.find(w => w.id === t.workflow);
            const roles = (t.allowed_roles||[]).map(r => badge(r, ROLE_COLORS)).join(' ');
            html += `<tr>
                <td>${badge(t.from_state, STATE_COLORS)}</td>
                <td style="color:var(--text-muted);text-align:center">→</td>
                <td>${badge(t.to_state, STATE_COLORS)}</td>
                <td>${roles}</td>
                <td style="color:var(--text-dim);font-size:11px">${wf?.name || '—'}</td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        el('page-transitions').innerHTML = html;
    } catch (e) { el('page-transitions').innerHTML = `<div class="msg msg-error">Failed: ${e.message}</div>`; }
}

// ========================================
// AI ENGINE
// ========================================
function loadAIPage() {
    const taskOpts = TASKS.map(t => `<option value="${t.id}">${t.task_key} — ${t.title}</option>`).join('');
    el('page-ai').innerHTML = `
        <h2 class="page-title">AI ENGINE</h2>
        <p class="page-sub">Intelligent priority scoring, task routing, and natural language queries</p>
        <div class="card" style="margin-top:20px">
            <h3 style="font-size:12px;font-weight:600;margin:0 0 12px;color:var(--purple)">⚡ Natural Language Query</h3>
            <p style="color:var(--text-muted);font-size:11px;margin-bottom:12px">Ask: "show me critical bugs", "unassigned tasks", "tasks assigned to dev_alice", "overdue tasks"</p>
            <div style="display:flex;gap:10px"><input id="nl-input" style="flex:1" placeholder='Try: "show me all high priority bugs"'>
            <button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="doNLQuery()">QUERY</button></div>
            <div id="nl-result"></div>
        </div>
        <div class="grid-2" style="margin-top:14px">
            <div class="card">
                <h3 style="font-size:12px;font-weight:600;margin:0 0 12px;color:var(--amber)">🎯 Priority Scoring</h3>
                <select id="score-task" style="margin-bottom:10px"><option value="">Select a task...</option>${taskOpts}</select>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-sm" style="background:var(--amber);color:#fff" onclick="doScore()">SCORE TASK</button>
                    <button class="btn btn-sm" style="background:transparent;border:1px solid var(--amber);color:var(--amber)" onclick="doScoreAll()">SCORE ALL</button>
                </div><div id="score-result"></div>
            </div>
            <div class="card">
                <h3 style="font-size:12px;font-weight:600;margin:0 0 12px;color:var(--green)">🤖 Smart Task Routing</h3>
                <select id="route-task" style="margin-bottom:10px"><option value="">Select a task...</option>${taskOpts}</select>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-sm" style="background:var(--green);color:#fff" onclick="doRoute()">RECOMMEND</button>
                    <button class="btn btn-sm" style="background:transparent;border:1px solid var(--green);color:var(--green)" onclick="doAutoAssign()">AUTO-ASSIGN</button>
                </div><div id="route-result"></div>
            </div>
        </div>`;
    el('nl-input').addEventListener('keydown', e => { if (e.key==='Enter') doNLQuery(); });
}

async function doNLQuery() {
    const q = el('nl-input').value; if (!q) return;
    try {
        const data = await apiCall('/ai/query/','POST',{question:q});
        let h = `<div class="msg msg-info" style="margin-top:14px">${data.explanation}</div>`;
        if (data.parsed_filters && Object.keys(data.parsed_filters).length)
            h += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${Object.entries(data.parsed_filters).map(([k,v])=>`<span class="badge" style="background:rgba(139,92,246,0.1);color:var(--purple);border:1px solid rgba(139,92,246,0.2)">${k}: ${v}</span>`).join('')}</div>`;
        if (data.results?.length) {
            h += `<table><thead><tr>${['Key','Title','State','Priority','Assignee'].map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>`;
            data.results.forEach(t => { h += `<tr><td style="color:var(--accent);font-weight:600;font-size:12px">${t.task_key}</td><td>${t.title}</td><td>${badge(t.state,STATE_COLORS)}</td><td>${badge(t.priority,PRIORITY_COLORS)}</td><td style="color:var(--text-dim)">${t.assigned_to||'—'}</td></tr>`; });
            h += `</tbody></table>`;
        } else h += `<div class="empty-state">No matching tasks</div>`;
        el('nl-result').innerHTML = h;
    } catch { el('nl-result').innerHTML = `<div class="msg msg-error" style="margin-top:14px">Query failed</div>`; }
}

async function doScore() {
    const tid = el('score-task').value; if (!tid) return;
    try {
        const d = await apiCall('/ai/score-priority/','POST',{task_id:tid}); const s = d.priority_analysis;
        const c = s.score>=0.7?'var(--red)':s.score>=0.4?'var(--amber)':'var(--green)';
        let h = `<div style="margin-top:14px;padding:14px;background:var(--bg);border-radius:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;font-weight:600">${d.task_key}</span><span style="font-size:20px;font-weight:700;color:${c}">${(s.score*100).toFixed(0)}%</span></div>
            <p style="font-size:11px;color:var(--accent);margin:0 0 8px">${s.explanation}</p>
            <p style="font-size:11px;color:var(--text-dim);margin:0 0 10px">Est. hours: ${d.estimated_hours}h</p>`;
        Object.entries(s.factors||{}).forEach(([k,v]) => { const fc = v>=0.7?'var(--red)':v>=0.4?'var(--amber)':'var(--green)'; h += `<div class="score-bar"><span class="score-bar-label">${k.replace(/_/g,' ')}</span><div class="score-bar-track"><div class="score-bar-fill" style="width:${v*100}%;background:${fc}"></div></div><span class="score-bar-value">${(v*100).toFixed(0)}%</span></div>`; });
        h += `</div>`; el('score-result').innerHTML = h; await loadGlobalData();
    } catch { el('score-result').innerHTML = `<div class="msg msg-error" style="margin-top:14px">Scoring failed</div>`; }
}

async function doScoreAll() {
    try {
        const d = await apiCall('/ai/score-all/','POST');
        let h = `<div class="msg msg-success" style="margin-top:14px">${d.scored_count} tasks scored</div><div style="max-height:200px;overflow-y:auto">`;
        (d.results||[]).forEach(r => { const c = r.score>=0.7?'var(--red)':r.score>=0.4?'var(--amber)':'var(--green)'; h += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(30,41,59,0.03);font-size:11px"><span style="color:var(--accent)">${r.task_key}</span><span style="color:${c};font-weight:600">${(r.score*100).toFixed(0)}%</span></div>`; });
        h += `</div>`; el('score-result').innerHTML = h; await loadGlobalData();
    } catch { el('score-result').innerHTML = `<div class="msg msg-error" style="margin-top:14px">Bulk scoring failed</div>`; }
}

async function doRoute() {
    const tid = el('route-task').value; if (!tid) return;
    try {
        const d = await apiCall('/ai/recommend-assignee/','POST',{task_id:tid});
        let h = `<div style="margin-top:14px">`;
        (d.recommendations||[]).forEach((r,i) => { const c = r.total_score>=0.7?'var(--green)':r.total_score>=0.4?'var(--amber)':'var(--red)';
            h += `<div class="rec-card ${i===0?'top':''}"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:600">${i===0?'👑 ':''}${r.username}</span><span style="font-size:14px;font-weight:700;color:${c}">${(r.total_score*100).toFixed(0)}%</span></div>
            <p style="font-size:10px;color:var(--text-dim);margin:0 0 6px">${r.reasoning}</p>
            <div style="display:flex;gap:6px;flex-wrap:wrap">${Object.entries(r.factors||{}).map(([k,v])=>{const fc=v>=0.7?'#10b981':v>=0.4?'#f59e0b':'#ef4444';return `<span class="badge" style="background:${fc}18;color:${fc};border:1px solid ${fc}30">${k.replace(/_/g,' ')}: ${(v*100).toFixed(0)}%</span>`;}).join('')}</div></div>`; });
        h += `</div>`; el('route-result').innerHTML = h;
    } catch { el('route-result').innerHTML = `<div class="msg msg-error" style="margin-top:14px">Routing failed</div>`; }
}

async function doAutoAssign() {
    const tid = el('route-task').value; if (!tid) return;
    try { const d = await apiCall('/ai/auto-assign/','POST',{task_id:tid}); el('route-result').innerHTML = `<div class="msg msg-success" style="margin-top:14px">${d.message}</div>`; await loadGlobalData(); }
    catch { el('route-result').innerHTML = `<div class="msg msg-error" style="margin-top:14px">Auto-assign failed</div>`; }
}

// ========================================
// AUDIT LOGS
// ========================================
async function loadAuditPage() {
    try {
        const data = await apiCall('/audit-logs/');
        const logs = data.results || [];
        let html = `<div><h2 class="page-title">AUDIT LOGS</h2><p class="page-sub">${logs.length} entries · Immutable activity record</p></div>`;
        html += `<div class="card" style="margin-top:20px"><table><thead><tr>
            ${['Task','Action','Performed By','Old Value','New Value','Reason','Time'].map(h=>`<th>${h}</th>`).join('')}
        </tr></thead><tbody>`;
        if (!logs.length) { html += `<tr><td colspan="7" class="empty-state">No audit logs</td></tr>`; }
        else {
            logs.forEach(l => {
                const oldVal = l.old_value ? `<code style="font-size:10px;color:var(--red);background:rgba(239,68,68,0.08);padding:2px 6px;border-radius:4px">${JSON.stringify(l.old_value)}</code>` : '—';
                const newVal = l.new_value ? `<code style="font-size:10px;color:var(--green);background:rgba(16,185,129,0.08);padding:2px 6px;border-radius:4px">${JSON.stringify(l.new_value)}</code>` : '—';
                html += `<tr>
                    <td style="color:var(--accent);font-weight:600;font-size:12px">${l.task ? (TASKS.find(t=>t.id===l.task)?.task_key || l.task.slice(0,8)+'...') : '—'}</td>
                    <td><span style="font-size:13px">${ACTION_ICONS[l.action]||'📝'}</span> ${badge(l.action, {created:'#10b981',state_changed:'#f59e0b',assigned:'#8b5cf6',commented:'#06b6d4',sla_breached:'#ef4444',updated:'#3b82f6',deleted:'#ef4444'})}</td>
                    <td style="font-size:12px">${l.performed_by_name||'System'}</td>
                    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${oldVal}</td>
                    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${newVal}</td>
                    <td style="color:var(--text-dim);font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${l.reason||'—'}</td>
                    <td style="color:var(--text-muted);font-size:10px;white-space:nowrap">${formatDate(l.timestamp)}</td>
                </tr>`;
            });
        }
        html += `</tbody></table></div>`;
        el('page-audit').innerHTML = html;
    } catch (e) { el('page-audit').innerHTML = `<div class="msg msg-error">Failed: ${e.message}</div>`; }
}

// ========================================
// COMMENTS
// ========================================
async function loadCommentsPage() {
    try {
        const data = await apiCall('/comments/');
        const comments = data.results || [];
        let html = `<div><h2 class="page-title">COMMENTS</h2><p class="page-sub">${comments.length} comments across all tasks</p></div>`;
        html += `<div class="card" style="margin-top:20px">`;
        if (!comments.length) { html += `<div class="empty-state">No comments yet</div>`; }
        else {
            comments.forEach(c => {
                const task = TASKS.find(t => t.id === c.task);
                html += `<div class="activity-item">
                    <span style="font-size:14px">💬</span>
                    <div style="flex:1">
                        <div style="display:flex;gap:10px;align-items:center;margin-bottom:4px">
                            <span style="color:var(--accent);font-weight:600;font-size:12px">${task?.task_key || c.task?.slice(0,8)+'...'}</span>
                            <span style="color:var(--purple);font-size:11px;font-weight:600">${c.author_name}</span>
                        </div>
                        <div style="font-size:12px;color:var(--text-dim)">${c.content}</div>
                    </div>
                    <span style="color:var(--text-muted);font-size:10px;white-space:nowrap">${timeAgo(c.created_at)}</span>
                </div>`;
            });
        }
        html += `</div>`;
        el('page-comments').innerHTML = html;
    } catch (e) { el('page-comments').innerHTML = `<div class="msg msg-error">Failed: ${e.message}</div>`; }
}
</script>
</body>
