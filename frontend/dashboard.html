<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Orchestrator — Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0a0e17;
        --surface: #111827;
        --surface-hover: #1a2234;
        --border: #1e293b;
        --border-light: #334155;
        --accent: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.15);
        --green: #10b981;
        --red: #ef4444;
        --amber: #f59e0b;
        --purple: #8b5cf6;
        --cyan: #06b6d4;
        --text: #e2e8f0;
        --text-dim: #94a3b8;
        --text-muted: #64748b;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      .hidden {
        display: none !important;
      }
      .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            ellipse at 30% 20%,
            var(--accent-glow),
            transparent 50%
          ),
          var(--bg);
        padding: 20px;
      }
      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 48px 40px;
        width: 380px;
        max-width: 100%;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
      }
      input[type="datetime-local"] {
        color-scheme: dark;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.5px;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-sm {
        padding: 7px 16px;
        font-size: 11px;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
      }
      .btn-danger {
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      .sidebar {
        width: 220px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        display: flex;
        flex-direction: column;
        z-index: 20;
        overflow-y: auto;
        transition: transform 0.3s;
      }
      .main {
        margin-left: 220px;
        padding: 28px 32px;
        min-height: 100vh;
        transition: margin-left 0.3s;
      }
      .menu-toggle {
        display: none;
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 30;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 20px;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 15;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        cursor: pointer;
        border-radius: 8px;
        margin: 2px 10px;
        color: var(--text-dim);
        font-size: 12px;
        transition: all 0.15s;
        border: 1px solid transparent;
      }
      .nav-item:hover {
        background: var(--surface-hover);
      }
      .nav-item.active {
        background: var(--accent-glow);
        color: var(--accent);
        font-weight: 600;
        border-color: rgba(59, 130, 246, 0.13);
      }
      .nav-section {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-muted);
        padding: 16px 18px 6px;
        font-weight: 600;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
      }
      .stat-card {
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .stat-card:hover {
        border-color: var(--accent);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.08);
      }
      .stat-icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .stat-value {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.1;
      }
      .stat-label {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 3px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.3px;
        white-space: nowrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        padding: 10px 14px;
        text-align: left;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      th:hover {
        color: var(--accent);
      }
      th.no-sort {
        cursor: default;
      }
      th.no-sort:hover {
        color: var(--text-muted);
      }
      td {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(30, 41, 59, 0.03);
        vertical-align: middle;
      }
      tr.clickable {
        cursor: pointer;
        transition: background 0.1s;
      }
      tr.clickable:hover {
        background: var(--surface-hover);
      }
      .table-wrap {
        overflow-x: auto;
      }
      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin: 0 0 14px;
        font-weight: 600;
      }
      .page-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .page-sub {
        color: var(--text-muted);
        font-size: 11px;
        margin-top: 4px;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .grid-5 {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 14px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .progress-bg {
        height: 6px;
        background: var(--bg);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.6s ease;
      }
      .activity-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
      }
      .activity-item + .activity-item {
        border-top: 1px solid rgba(30, 41, 59, 0.03);
      }
      .msg {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      .msg-error {
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .msg-success {
        background: rgba(16, 185, 129, 0.08);
        border: 1px solid rgba(16, 185, 129, 0.15);
        color: var(--green);
      }
      .msg-info {
        background: rgba(139, 92, 246, 0.06);
        border: 1px solid rgba(139, 92, 246, 0.13);
        color: var(--purple);
      }
      .score-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .score-bar-label {
        font-size: 10px;
        color: var(--text-muted);
        width: 100px;
      }
      .score-bar-track {
        flex: 1;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
      }
      .score-bar-fill {
        height: 100%;
        border-radius: 2px;
      }
      .score-bar-value {
        font-size: 10px;
        color: var(--text-dim);
        width: 30px;
        text-align: right;
      }
      .transition-btn {
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 11px;
        cursor: pointer;
        font-family: inherit;
        background: transparent;
        color: var(--text-dim);
        border: 1px solid var(--border);
        transition: all 0.15s;
      }
      .transition-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .rec-card {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        overflow: hidden;
      }
      .rec-card.top {
        background: rgba(16, 185, 129, 0.04);
        border-color: rgba(16, 185, 129, 0.13);
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(30, 41, 59, 0.05);
        font-size: 12px;
      }
      .detail-label {
        color: var(--text-muted);
      }
      .detail-value {
        color: var(--text);
        font-weight: 500;
        text-align: right;
        max-width: 60%;
        word-break: break-all;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        background: var(--accent-glow);
        color: var(--accent);
        margin: 2px;
        border: 1px solid rgba(59, 130, 246, 0.15);
      }
      .empty-state {
        color: var(--text-muted);
        font-size: 12px;
        text-align: center;
        padding: 40px 20px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px;
        width: 480px;
        max-width: 100%;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 14px;
      }
      .modal-body {
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      .clickable-bar {
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .clickable-bar:hover {
        opacity: 0.8;
      }
      .search-bar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .search-bar input {
        max-width: 250px;
      }
      .pagination {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .pagination button {
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 11px;
        cursor: pointer;
        font-family: inherit;
        background: transparent;
        color: var(--text-dim);
        border: 1px solid var(--border);
        transition: all 0.15s;
      }
      .pagination button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .pagination button.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .pagination button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .link {
        color: var(--accent);
        cursor: pointer;
        text-decoration: underline;
        font-weight: 600;
      }
      @media (max-width: 1400px) {
        .grid-5 {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 1024px) {
        .grid-5 {
          grid-template-columns: repeat(2, 1fr);
        }
        .grid-3 {
          grid-template-columns: 1fr 1fr;
        }
        .sidebar {
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .sidebar-overlay.open {
          display: block;
        }
        .main {
          margin-left: 0;
          padding: 20px 16px;
          padding-top: 56px;
        }
        .menu-toggle {
          display: block;
        }
      }
      @media (max-width: 640px) {
        .grid-5,
        .grid-3,
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }
        .login-box {
          padding: 32px 24px;
        }
        .search-bar input {
          max-width: 100%;
        }
      }

      .member-list {
        max-height: 150px;
        overflow-y: auto;
        padding: 10px;
        background: var(--bg);
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .member-list label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 4px;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.1s;
      }
      .member-list label:hover {
        background: var(--surface-hover);
      }
      .member-list input[type="checkbox"] {
        width: 16px;
        height: 16px;
        min-width: 16px;
        accent-color: var(--accent);
        cursor: pointer;
        margin: 0;
      }

      #page-tasks,
      #page-dashboard,
      #page-users,
      #page-teams,
      #page-organizations,
      #page-workflows,
      #page-transitions,
      #page-ai,
      #page-audit,
      #page-comments {
        animation: fadeIn 0.15s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-light);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border-light) transparent;
      }
      .sidebar::-webkit-scrollbar {
        width: 4px;
      }
      .member-list::-webkit-scrollbar {
        width: 4px;
      }

      select {
        text-overflow: ellipsis;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="modal-container"></div>
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      onclick="toggleSidebar()"
    ></div>

    <div id="login-screen" class="login-wrap">
      <div class="login-box">
        <div style="text-align: center; margin-bottom: 32px">
          <div style="font-size: 28px; margin-bottom: 6px">⚡</div>
          <h1 style="font-size: 18px; font-weight: 700; letter-spacing: 1px">
            WORK ORCHESTRATOR
          </h1>
          <p
            style="
              color: var(--text-muted);
              font-size: 11px;
              margin-top: 8px;
              letter-spacing: 0.5px;
            "
          >
            AI-POWERED WORKFLOW ENGINE
          </p>
        </div>
        <div id="login-error" class="msg msg-error hidden"></div>
        <div style="margin-bottom: 14px">
          <label
            style="
              display: block;
              font-size: 10px;
              text-transform: uppercase;
              letter-spacing: 1px;
              color: var(--text-muted);
              margin-bottom: 6px;
            "
            >Username</label
          ><input id="login-user" placeholder="admin_user" />
        </div>
        <div style="margin-bottom: 24px">
          <label
            style="
              display: block;
              font-size: 10px;
              text-transform: uppercase;
              letter-spacing: 1px;
              color: var(--text-muted);
              margin-bottom: 6px;
            "
            >Password</label
          ><input id="login-pass" type="password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" style="width: 100%" onclick="doLogin()">
          SIGN IN →
        </button>
        <p
          style="
            text-align: center;
            color: var(--text-muted);
            font-size: 10px;
            margin-top: 20px;
          "
        >
          Test: admin_user / testpass123
        </p>
      </div>
    </div>

    <div id="app-shell" class="hidden">
      <div class="sidebar" id="sidebar">
        <div
          style="
            padding: 22px 18px 20px;
            border-bottom: 1px solid var(--border);
          "
        >
          <div style="font-size: 13px; font-weight: 700; letter-spacing: 1px">
            ⚡ ORCHESTRATOR
          </div>
          <div
            style="
              font-size: 10px;
              color: var(--text-muted);
              margin-top: 4px;
              letter-spacing: 0.5px;
            "
          >
            WORKFLOW ENGINE v1.0
          </div>
        </div>
        <div style="padding: 10px 0; flex: 1">
          <div class="nav-section">Overview</div>
          <div
            class="nav-item active"
            data-page="dashboard"
            onclick="switchPage('dashboard')"
          >
            <span>◆</span> Dashboard
          </div>
          <div class="nav-section" style="margin-top: 8px">Management</div>
          <div class="nav-item" data-page="tasks" onclick="switchPage('tasks')">
            <span>☰</span> Tasks
          </div>
          <div class="nav-item" data-page="users" onclick="switchPage('users')">
            <span>👥</span> Users
          </div>
          <div class="nav-item" data-page="teams" onclick="switchPage('teams')">
            <span>🏢</span> Teams
          </div>
          <div
            class="nav-item"
            data-page="organizations"
            onclick="switchPage('organizations')"
          >
            <span>🏛</span> Organizations
          </div>
          <div class="nav-section" style="margin-top: 8px">Configuration</div>
          <div
            class="nav-item"
            data-page="workflows"
            onclick="switchPage('workflows')"
          >
            <span>🔀</span> Workflows
          </div>
          <div
            class="nav-item"
            data-page="transitions"
            onclick="switchPage('transitions')"
          >
            <span>→</span> Transitions
          </div>
          <div class="nav-section" style="margin-top: 8px">Intelligence</div>
          <div class="nav-item" data-page="ai" onclick="switchPage('ai')">
            <span>⚡</span> AI Engine
          </div>
          <div class="nav-section" style="margin-top: 8px">History</div>
          <div class="nav-item" data-page="audit" onclick="switchPage('audit')">
            <span>📜</span> Audit Logs
          </div>
          <div
            class="nav-item"
            data-page="comments"
            onclick="switchPage('comments')"
          >
            <span>💬</span> Comments
          </div>
        </div>
        <div style="padding: 16px 18px; border-top: 1px solid var(--border)">
          <div
            style="font-size: 11px; color: var(--text-dim); margin-bottom: 4px"
          >
            <span style="color: var(--green)">●</span>
            <span id="current-user"></span>
          </div>
          <div
            style="
              font-size: 10px;
              color: var(--text-muted);
              margin-bottom: 8px;
            "
            id="current-role"
          ></div>
          <button
            class="btn btn-sm btn-outline"
            style="width: 100%; margin-bottom: 6px"
            onclick="showEditProfile()"
          >
            ✏ Profile
          </button>
          <button
            class="btn btn-outline"
            style="
              width: 100%;
              padding: 7px;
              font-size: 10px;
              letter-spacing: 0.5px;
            "
            onclick="doLogout()"
          >
            SIGN OUT
          </button>
        </div>
      </div>
      <div class="main" id="main-content">
        <div id="global-msg"></div>
        <div id="page-dashboard"></div>
        <div id="page-tasks" class="hidden"></div>
        <div id="page-users" class="hidden"></div>
        <div id="page-teams" class="hidden"></div>
        <div id="page-organizations" class="hidden"></div>
        <div id="page-workflows" class="hidden"></div>
        <div id="page-transitions" class="hidden"></div>
        <div id="page-ai" class="hidden"></div>
        <div id="page-audit" class="hidden"></div>
        <div id="page-comments" class="hidden"></div>
      </div>
    </div>

    <script>
      const API = "http://127.0.0.1:8000/api/v1";
      let TOKEN = null,
        ORG_ROLES=[], ORG_PRIORITIES=[], ORG_TASK_TYPES=[],
        TASKS = [],
        WORKFLOWS = [],
        ALL_USERS = [],
        TEAMS = [],
        ORGS = [],
        CURRENT_USER = {},
        PENDING_FILTER = null;
      let TASK_SORT = { field: "created_at", dir: "desc" },

      function $(id) {

      function badge(t, m) {
          const DYNAMIC_COLORS = ['#3b82f6','#f59e0b','#8b5cf6','#06b6d4','#10b981','#ef4444','#ec4899','#f97316','#14b8a6','#6366f1'];
          let c = (m || {})[t];
          if(!c && t) {
              // Generate consistent color for unknown values based on string hash
              let hash = 0;
              for(let i = 0; i < t.length; i++) hash = t.charCodeAt(i) + ((hash << 5) - hash);
              c = DYNAMIC_COLORS[Math.abs(hash) % DYNAMIC_COLORS.length];
          }
          c = c || '#64748b';
          return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30">${(t || "—").replace(/_/g, " ")}</span>`;
      }
      function timeAgo(ts) {
        if (!ts) return "—";
        const d = new Date(ts),
          n = new Date(),
          s = (n - d) / 1000;
        if (s < 60) return "just now";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        if (s < 86400) return Math.floor(s / 3600) + "h ago";
        return Math.floor(s / 86400) + "d ago";
      }
      function formatDate(ts) {
        return ts ? new Date(ts).toLocaleString() : "—";
      }
      function isAdmin() {
          if(CURRENT_USER.role === 'admin') return true;
          return ORG_ROLES.length > 0 && CURRENT_USER.role === ORG_ROLES[0];
      }
      function isManagerOrAbove() {
        if(CURRENT_USER.role === 'admin') return true;
        if(ORG_ROLES.length >= 2) return CURRENT_USER.role === ORG_ROLES[0] || CURRENT_USER.role === ORG_ROLES[1];
        return CURRENT_USER.role === 'admin' || CURRENT_USER.role === 'manager';
      }
      function isViewer() {
        if (ORG_ROLES.length > 0) return CURRENT_USER.role === ORG_ROLES[ORG_ROLES.length - 1];
        return CURRENT_USER.role === 'viewer';
      }
      function showGlobalMsg(m, e) {
        $("global-msg").innerHTML =
          `<div class="msg ${e ? "msg-error" : "msg-success"}">${m}</div>`;
        setTimeout(() => ($("global-msg").innerHTML = ""), 4000);
      }

        const el = $(id);
        if (el) {
          el.innerHTML = `<div class="msg ${e ? "msg-error" : "msg-success"}">${m}</div>`;
          setTimeout(() => (el.innerHTML = ""), 3000);

      function statCard(i, l, v, c, s = "", o = "") {
        return `<div class="card stat-card" onclick="${o}"><div class="stat-icon" style="background:${c}15;border:1px solid ${c}25">${i}</div><div><div class="stat-value">${v}</div><div class="stat-label">${l}</div>${s ? `<div style="font-size:11px;color:${c};margin-top:2px">${s}</div>` : ""}</div></div>`;
      }

      function showModal(t, b, a) {
        $("modal-container").innerHTML =
          `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box"><div class="modal-title">${t}</div><div class="modal-body">${b}</div><div class="modal-actions">${a.map((x) => `<button class="btn btn-sm" style="background:${x.color || "var(--accent)"};color:#fff" onclick="${x.onclick}">${x.label}</button>`).join("")}</div></div></div>`;
      }

        showModal(t, `<div style="color:var(--red)">${m}</div>`, [

        showModal(t, `<div style="color:var(--green)">${m}</div>`, [
          { label: "OK", color: "var(--green)", onclick: "closeModal()" },
        ]);

      function closeModal() {
        $("modal-container").innerHTML = "";
      }
      function toggleSidebar() {
        $("sidebar").classList.toggle("open");
        $("sidebar-overlay").classList.toggle("open");
      }

      async function apiCall(ep, method = "GET", body = null) {
        const o = { method, headers: { "Content-Type": "application/json" } };
        if (TOKEN) o.headers["Authorization"] = `Bearer ${TOKEN}`;
        if (body) o.body = JSON.stringify(body);
        const r = await fetch(API + ep, o);
        if (r.status === 401) {
          const ok = await tryRefresh();
          if (ok) {
            o.headers["Authorization"] = `Bearer ${TOKEN}`;
            const r2 = await fetch(API + ep, o);
            if (!r2.ok) throw new Error(await r2.text());
            return r2.json();
          }
          doLogout();
          throw new Error("Session expired");
        }
        if (r.status === 204) return {};
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(typeof e === "string" ? e : JSON.stringify(e));
        }
        return r.json();
      }
      async function tryRefresh() {
        const rt = sessionStorage.getItem("rt");
        if (!rt) return false;
        try {
          const r = await fetch(API + "/auth/refresh/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh: rt }),
          });
          if (!r.ok) return false;
          const d = await r.json();
          TOKEN = d.access;
          sessionStorage.setItem("at", TOKEN);
          return true;
        } catch {
          return false;
        }
      }

      async function doLogin() {
        const u = $("login-user").value,
          p = $("login-pass").value,
          e = $("login-error");
        try {
          const d = await apiCall("/auth/login/", "POST", {
            username: u,
            password: p,
          });
          if (d.access) {
            TOKEN = d.access;
            sessionStorage.setItem("at", TOKEN);
            sessionStorage.setItem("rt", d.refresh);
            $("login-screen").classList.add("hidden");
            $("app-shell").classList.remove("hidden");
            await loadGlobalData();
            loadDashboard();
          } else {
            e.textContent = "Invalid credentials";
            e.classList.remove("hidden");
          }
        } catch {
          e.textContent = "Connection failed";
          e.classList.remove("hidden");
        }
      }
      function doLogout() {
        TOKEN = null;
        sessionStorage.removeItem("at");
        sessionStorage.removeItem("rt");
        $("app-shell").classList.add("hidden");
        $("login-screen").classList.remove("hidden");
      }
      async function tryAutoLogin() {
        const t = sessionStorage.getItem("at");
        if (t) {
          TOKEN = t;
          try {
            await apiCall("/users/me/");
            $("login-screen").classList.add("hidden");
            $("app-shell").classList.remove("hidden");
            await loadGlobalData();
            loadDashboard();
          } catch {
            TOKEN = null;
            sessionStorage.removeItem("at");
            sessionStorage.removeItem("rt");
          }
        }
      }
      window.addEventListener("DOMContentLoaded", tryAutoLogin);
      $("login-pass").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
      $("login-user").addEventListener("keydown", (e) => {
        if (e.key === "Enter") $("login-pass").focus();
      });

      async function loadGlobalData(){
          try{
              const[me,td,wd,ud,tmd,od]=await Promise.all([
                  apiCall('/users/me/'),apiCall('/tasks/?page_size=100'),apiCall('/workflows/'),
                  apiCall('/users/'),apiCall('/teams/'),apiCall('/organizations/')
              ]);
              CURRENT_USER=me;TASKS=td.results||[];WORKFLOWS=wd.results||[];
              ALL_USERS=ud.results||[];TEAMS=tmd.results||[];ORGS=od.results||[];
              $('current-user').textContent=me.username||'';
              $('current-role').textContent=(me.role||'').toUpperCase();

              // Load dynamic config from CURRENT USER's organization
              const org = ORGS.find(o => o.id === CURRENT_USER.organization) || ORGS[0] || {};
              ORG_ROLES = org.allowed_roles?.length ? org.allowed_roles : ['admin','manager','engineer','viewer'];
              ORG_PRIORITIES = org.allowed_priorities?.length ? org.allowed_priorities : PRIORITIES;
              ORG_TASK_TYPES = org.allowed_task_types?.length ? org.allowed_task_types : ['bug','feature','task','improvement'];
          }catch(e){showGlobalMsg('Load failed: '+e.message,true)}
      }

      function switchPage(p) {
        document
          .querySelectorAll(".nav-item")
          .forEach((el) =>
            el.classList.toggle("active", el.dataset.page === p),
          );
        ALL_PAGES.forEach((x) =>
          $("page-" + x).classList.toggle("hidden", x !== p),

          $("sidebar").classList.remove("open");

      // =================== PROFILE EDIT ===================

      // =================== DASHBOARD ===================
      async function loadDashboard() {
        try {
          const [dash, perf, act] = await Promise.all([
            apiCall("/dashboard/overview/"),
            apiCall("/dashboard/team-performance/"),
            apiCall("/dashboard/activity/"),
          ]);
          const o = dash.overview || {},
            s = dash.sla || {},
            tp = perf.team_performance || [],
            ac = act.recent_activity || [];
          const active =
            (o.total_tasks || 0) -
            (o.by_state?.done || 0) -
            (o.by_state?.cancelled || 0);
          let h = `<div><h2 class="page-title">COMMAND CENTER</h2><p class="page-sub">Real-time overview · Click stats to filter</p></div>`;
          h += `<div class="grid-5" style="margin-top:20px">${statCard("📋", "Total Tasks", o.total_tasks || 0, "#3b82f6", "", "goTasksFiltered('all')")}${statCard("⚡", "Active", active, "#f59e0b", `${o.last_7_days?.created || 0} new this week`, "goTasksFiltered('active')")}${statCard("✅", "Completed", Object.entries(o.by_state||{}).reduce((sum,[k,v])=>(WORKFLOWS.flatMap(w=>w.final_states||[]).includes(k)?sum+v:sum),0) || 0, "#10b981", `${o.last_7_days?.completed || 0} this week`, "goTasksFiltered('completed')")}${statCard("🔴", "SLA Breached", s.breached || 0, "#ef4444", s.breach_rate ? s.breach_rate + "% rate" : "", "goTasksFiltered('sla')")}${statCard("👤", "Unassigned", o.unassigned || 0, "#8b5cf6", "", "goTasksFiltered('unassigned')")}</div>`;
          const states = Object.entries(o.by_state || {}),
            prios = Object.entries(o.by_priority || {}),
            mp = Math.max(...prios.map((p) => p[1]), 1),
            st = states.reduce((a, b) => a + b[1], 0) || 1;
          let sH = states.length
            ? states
                .map(([k, v]) => {
                  const c = STATE_COLORS[k] || "#64748b";
                  return `<div class="clickable-bar" onclick="goTasksFiltered('state','${k}')" style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:10px;color:var(--text-muted);width:70px">${k.replace(/_/g, " ")}</span><div style="flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(v / st) * 100}%;background:${c};border-radius:4px;min-width:${v > 0 ? "24px" : "0"};display:flex;align-items:center;padding-left:8px"><span style="font-size:10px;color:#fff;font-weight:600">${v}</span></div></div></div>`;
                })
                .join("")
            : '<div class="empty-state">No data</div>';
          let pH = prios.length
          ? prios
              .map(([k, v]) => {
                  const DCOL = ['#3b82f6','#f59e0b','#8b5cf6','#06b6d4','#10b981','#ef4444','#ec4899','#f97316'];
                  let c = PRIORITY_COLORS[k];
                  if(!c){let h=0;for(let i=0;i<k.length;i++)h=k.charCodeAt(i)+((h<<5)-h);c=DCOL[Math.abs(h)%DCOL.length]}
                  return `<div class="clickable-bar" onclick="goTasksFiltered('priority','${k}')" style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:10px;color:var(--text-muted);width:60px">${k}</span><div style="flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(v / mp) * 100}%;background:${c};border-radius:4px;min-width:${v > 0 ? "24px" : "0"};display:flex;align-items:center;padding-left:8px"><span style="font-size:10px;color:#fff;font-weight:600">${v}</span></div></div></div>`;

            : '<div class="empty-state">No data</div>';

                        : "var(--green)";
                  return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px"><span>${p.username.replace(/_/g, " ")}</span><span style="color:${c}">${p.workload_percentage}% · ${p.active_tasks} active</span></div><div class="progress-bg"><div class="progress-fill" style="width:${Math.min(p.workload_percentage, 100)}%;background:${c}"></div></div></div>`;

          h += `<div class="grid-2" style="margin-top:14px"><div class="card"><h3 class="section-title">SLA Health</h3><div class="detail-row"><span class="detail-label">Healthy</span><span style="color:var(--green)">${s.healthy || 0}</span></div><div class="detail-row"><span class="detail-label">At Risk</span><span style="color:var(--amber)">${s.at_risk || 0}</span></div><div class="detail-row"><span class="detail-label">Breached</span><span style="color:var(--red)">${s.breached || 0}</span></div><button class="btn btn-sm btn-outline" style="margin-top:14px;width:100%" onclick="runSLACheck()">🔍 RUN SLA CHECK</button></div><div class="card"><h3 class="section-title">Quick Stats</h3><div class="detail-row"><span class="detail-label">Org</span><span class="detail-value">${(ORGS.find(o=>o.id===CURRENT_USER.organization)||ORGS[0])?.name || "—"}</span></div><div class="detail-row"><span class="detail-label">Users</span><span class="detail-value">${ALL_USERS.length}</span></div><div class="detail-row"><span class="detail-label">Teams</span><span class="detail-value">${TEAMS.length}</span></div><div class="detail-row"><span class="detail-label">Workflows</span><span class="detail-value">${WORKFLOWS.length}</span></div></div></div>`;
          const aH =

                        <div style="display:flex;gap:8px;align-items:center">

                            <span style="font-size:10px;color:var(--amber);font-weight:600">${t.hours_remaining}h left</span>
                        </div>
                    </div>`;
            });
            body += `</div>`;
          }

          // No issues
          if (
            (!res.breached_tasks || res.breached_tasks.length === 0) &&
            (!res.at_risk_tasks || res.at_risk_tasks.length === 0)
          ) {
            body += `<div style="text-align:center;padding:20px;color:var(--green)">✅ All tasks are healthy — no SLA breaches or at-risk tasks found.</div>`;
          }

          showModal("🔍 SLA Health Check", body, [
            { label: "OK", color: "var(--accent)", onclick: "closeModal()" },
          ]);
          loadDashboard();
        } catch {
          showErrorModal("Error", "SLA check failed");
        }
      }

      // =================== TASKS ===================
      async function loadTasksPage() {
        await loadGlobalData();
        const f = PENDING_FILTER;
        PENDING_FILTER = null;
        if (f) {
          if (f.type === "state") renderTasks({ state: f.value });
          else if (f.type === "priority") renderTasks({ priority: f.value });
          else if (f.type === "sla") renderTasks({ sla: true });
          else if (f.type === "unassigned") renderTasks({ unassigned: true });
          else if (f.type === "active") renderTasks({ active: true });
          else if (f.type === "completed") renderTasks({ completed: true });
          else renderTasks({});
        } else renderTasks({});
      }

      function renderTasks(filters = {}) {
        const fs = filters.state || "",
          fp = filters.priority || "",
          ft = filters.team || "",
          fSLA = filters.sla || false,
          fUn = filters.unassigned || false,
          fAct = filters.active || false,
          fComp = filters.completed || false,
          search = filters.search || "";
        let filtered = TASKS.filter((t) => {
          if (fs && t.current_state !== fs) return false;
          if (fp && t.priority !== fp) return false;
          if (fSLA && !t.sla_breached) return false;
          if (fUn && t.assigned_to_name) return false;
          if (fAct) {
              const wfFinals = WORKFLOWS.flatMap(w => w.final_states || []);
              const finals = wfFinals.length ? wfFinals : ['done', 'cancelled'];
              if (finals.includes(t.current_state)) return false;
          }
          if (fComp) {
              const wfFinals = WORKFLOWS.flatMap(w => w.final_states || []);
              const finals = wfFinals.length ? wfFinals : ['done', 'cancelled'];
              if (!finals.includes(t.current_state)) return false;
          }
          if (ft && t.team !== ft) return false;
          if (search) {
            const s = search.toLowerCase();
            if (
              !t.title.toLowerCase().includes(s) &&
              !t.task_key.toLowerCase().includes(s)
            )
              return false;
          }
          return true;
        });
        // Sort
        filtered.sort((a, b) => {
          let va = a[TASK_SORT.field],
            vb = b[TASK_SORT.field];
          if (TASK_SORT.field === "ai_priority_score") {
            va = va || 0;
            vb = vb || 0;
          }
          if (va < vb) return TASK_SORT.dir === "asc" ? -1 : 1;
          if (va > vb) return TASK_SORT.dir === "asc" ? 1 : -1;
          return 0;
        });
        // Pagination
        const perPage = 15,
          totalPages = Math.ceil(filtered.length / perPage) || 1;
        TASK_PAGE = Math.min(TASK_PAGE, totalPages);
        const paged = filtered.slice(
          (TASK_PAGE - 1) * perPage,
          TASK_PAGE * perPage,
        );
        let labels = [];
        if (fs) labels.push("State: " + fs.replace(/_/g, " "));
        if (fp) labels.push("Priority: " + fp);
        if (ft) {
          const tm = TEAMS.find((x) => x.id === ft);
          labels.push("Team: " + (tm?.name || ft));
        }
        if (fSLA) labels.push("SLA Breached");
        if (fUn) labels.push("Unassigned");
        if (fAct) labels.push("Active");
        if (fComp) labels.push("Completed");
        if (search) labels.push("Search: " + search);

        let h = `<div class="page-header"><div><h2 class="page-title">TASKS</h2><p class="page-sub">${filtered.length} tasks${labels.length ? " · " + labels.join(", ") : ""}</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${labels.length ? `<button class="btn btn-sm btn-outline" onclick="TASK_PAGE=1;renderTasks({})">✕ CLEAR</button>` : ""}
        ${!isViewer() ? '<button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="toggleCreateTask()">+ NEW TASK</button>' : ''}</div></div>`;
        h += `<div id="create-task-form" class="card hidden" style="margin-top:14px"></div>`;
        // Search + Filters
        h += `<div class="search-bar" style="margin:16px 0 14px">
        <input id="task-search" placeholder="🔍 Search tasks..." value="${search}" onkeydown="if(event.key==='Enter'){TASK_PAGE=1;renderTasks(getCurrentFilters())}" style="max-width:250px">
        <button class="btn btn-sm btn-outline" onclick="TASK_PAGE=1;renderTasks(getCurrentFilters())">Search</button>
        <select id="f-state" style="width:140px" onchange="TASK_PAGE=1;renderTasks(getCurrentFilters())"><option value="">All States</option>${(WORKFLOWS[0]?.allowed_states||STATES).map((s) => `<option value="${s}" ${fs === s ? "selected" : ""}>${s.replace(/_/g, " ")}</option>`).join("")}</select>
        <select id="f-prio" style="width:140px" onchange="TASK_PAGE=1;renderTasks(getCurrentFilters())"><option value="">All Priorities</option>${ORG_PRIORITIES.map(p=>`<option value="${p}" ${fp===p?'selected':''}>${p.replace(/_/g,' ')}</option>`).join('')}</select>
        <select id="f-team" style="width:140px" onchange="TASK_PAGE=1;renderTasks(getCurrentFilters())"><option value="">All Teams</option>${TEAMS.map((t) => `<option value="${t.id}" ${ft === t.id ? "selected" : ""}>${t.name}</option>`).join("")}</select>
    </div><div id="task-msg"></div>`;
        // Table
        const sortIcon = (f) =>
          TASK_SORT.field === f ? (TASK_SORT.dir === "asc" ? " ↑" : " ↓") : "";
        h += `<div class="card"><div class="table-wrap"><table><thead><tr>
        <th onclick="sortTasks('task_key')">Key${sortIcon("task_key")}</th>
        <th onclick="sortTasks('title')">Title${sortIcon("title")}</th>
        <th onclick="sortTasks('current_state')">State${sortIcon("current_state")}</th>
        <th onclick="sortTasks('priority')">Priority${sortIcon("priority")}</th>
        <th class="no-sort">Type</th><th class="no-sort">Team</th><th class="no-sort">Assignee</th>
        <th onclick="sortTasks('ai_priority_score')">AI${sortIcon("ai_priority_score")}</th>
        <th onclick="sortTasks('created_at')">Created${sortIcon("created_at")}</th>
        ${isAdmin() ? '<th class="no-sort">Action</th>' : ""}
    </tr></thead><tbody>`;
        if (!paged.length)
          h += `<tr><td colspan="${isAdmin() ? 10 : 9}" class="empty-state">No tasks</td></tr>`;
        else
          paged.forEach((t) => {
            const ai =
              t.ai_priority_score != null
                ? `<span style="color:${t.ai_priority_score >= 0.7 ? "var(--red)" : t.ai_priority_score >= 0.4 ? "var(--amber)" : "var(--green)"};font-weight:600;cursor:pointer" title="Click to re-score" onclick="event.stopPropagation();quickScore('${t.id}')">${(t.ai_priority_score * 100).toFixed(0)}%</span>`
                : `<span style="color:var(--text-muted);cursor:pointer" title="Click to score" onclick="event.stopPropagation();quickScore('${t.id}')">Score</span>`;
            h += `<tr class="clickable" onclick="showTaskDetail('${t.id}')"><td style="color:var(--accent);font-weight:600;font-size:12px">${t.task_key}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td><td>${badge(t.current_state, STATE_COLORS)}</td><td>${badge(t.priority, PRIORITY_COLORS)}</td><td style="color:var(--text-dim)">${t.task_type}</td><td style="color:${t.team_name ? "var(--cyan)" : "var(--text-muted)"}; font-size:11px">${t.team_name || "—"}</td><td style="color:${t.assigned_to_name ? "var(--text)" : "var(--text-muted)"}">${t.assigned_to_name || "—"}</td><td>${ai}</td><td style="color:var(--text-muted);font-size:11px">${timeAgo(t.created_at)}</td>${isAdmin() ? `<td><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteTask('${t.id}','${t.task_key}')" title="Delete">✕</button></td>` : ""}</tr>`;
          });
        h += `</tbody></table></div></div>`;
        // Pagination
        if (totalPages > 1) {
          h += `<div class="pagination"><button ${TASK_PAGE <= 1 ? "disabled" : ""} onclick="TASK_PAGE--;renderTasks(getCurrentFilters())">← Prev</button>`;
          for (let i = 1; i <= totalPages; i++) {
            if (
              totalPages > 7 &&
              i > 3 &&
              i < totalPages - 2 &&
              Math.abs(i - TASK_PAGE) > 1
            ) {
              if (i === 4 || i === totalPages - 3)
                h += `<span style="color:var(--text-muted)">…</span>`;
              continue;
            }
            h += `<button class="${i === TASK_PAGE ? "active" : ""}" onclick="TASK_PAGE=${i};renderTasks(getCurrentFilters())">${i}</button>`;
          }
          h += `<button ${TASK_PAGE >= totalPages ? "disabled" : ""} onclick="TASK_PAGE++;renderTasks(getCurrentFilters())">Next →</button></div>`;
        }
        h += `<div id="task-detail-panel"></div>`;
        $("page-tasks").innerHTML = h;
      }
      function getCurrentFilters() {
        return {
          state: $("f-state")?.value || "",
          priority: $("f-prio")?.value || "",
          team: $("f-team")?.value || "",
          search: $("task-search")?.value || "",
        };
      }
      function sortTasks(field) {
        if (TASK_SORT.field === field)
          TASK_SORT.dir = TASK_SORT.dir === "asc" ? "desc" : "asc";
        else {
          TASK_SORT.field = field;
          TASK_SORT.dir = "asc";
        }
        TASK_PAGE = 1;
        renderTasks(getCurrentFilters());
      }
      async function quickScore(id) {
        try {
          await apiCall("/ai/score-priority/", "POST", { task_id: id });
          await loadGlobalData();
          renderTasks(getCurrentFilters());
        } catch {
          showErrorModal("Error", "Scoring failed");
        }
      }

        showModal(
          "Delete Task",
          `Delete <strong>${key}</strong>? This cannot be undone.`,
          [
            {
              label: "CANCEL",
              color: "var(--text-muted)",

      async function confirmDeleteTask(id) {
        closeModal();

          await apiCall(`/tasks/${id}/`, "DELETE");

      function toggleCreateTask() {
        const f = $("create-task-form");
        f.classList.toggle("hidden");
        if (!f.classList.contains("hidden")) {
          f.innerHTML = `<h3 style="font-size:12px;font-weight:600;margin:0 0 14px;color:var(--accent)">Create New Task</h3><div class="grid-2" style="gap:12px"><div style="grid-column:1/-1"><input id="new-title" placeholder="Task title..."></div><div style="grid-column:1/-1"><textarea id="new-desc" style="min-height:70px;resize:vertical" placeholder="Description..."></textarea></div><select id="new-priority">${ORG_PRIORITIES.map((p,i)=>`<option value="${p}" ${i===Math.floor(ORG_PRIORITIES.length/2)?'selected':''}>${p.replace(/_/g,' ')}</option>`).join('')}</select><select id="new-type">${ORG_TASK_TYPES.map(t=>`<option value="${t}">${t.replace(/_/g,' ')}</option>`).join('')}</select><select id="new-workflow"><option value="">Workflow...</option>${WORKFLOWS.map((w) => `<option value="${w.id}">${w.name}</option>`).join("")}</select><select id="new-team"><option value="">No team</option>${TEAMS.map((t) => `<option value="${t.id}">${t.name}</option>`).join("")}</select><div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:6px">Due Date</label><input id="new-due" type="datetime-local"></div><div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:6px">Tags</label><input id="new-tags" placeholder="backend, urgent"></div></div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="createTask()">CREATE</button><button class="btn btn-sm btn-outline" onclick="$('create-task-form').classList.add('hidden')">CANCEL</button></div>`;
        }
      }
      async function createTask() {
        const body = {
          title: $("new-title").value,
          description: $("new-desc").value,
          priority: $("new-priority").value,
          task_type: $("new-type").value,
          workflow: $("new-workflow").value || WORKFLOWS[0]?.id || "",
          tags: $("new-tags").value
            ? $("new-tags")
                .value.split(",")
                .map((s) => s.trim())
                .filter(Boolean)
            : [],
        };
        if ($("new-team").value) body.team = $("new-team").value;
        if ($("new-due").value)
          body.due_date = new Date($("new-due").value).toISOString();
        try {
          await apiCall("/tasks/", "POST", body);
          await loadGlobalData();
          renderTasks({});
          showSuccessModal("Success", "Task created!");
        } catch (e) {
          showErrorModal("Error", e.message);
        }
      }

          );

          const comments = detail.comments || [];
          let h = `<div class="card" style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px"><h3 style="font-size:14px;font-weight:700;color:var(--accent)">${task.task_key}</h3><button class="btn btn-outline" style="padding:4px 12px;font-size:14px" onclick="$('task-detail-panel').innerHTML=''">×</button></div><p style="font-size:13px;font-weight:500;margin:8px 0 4px">${task.title}</p>${detail.description ? `<p style="font-size:11px;color:var(--text-dim);margin-bottom:14px">${detail.description}</p>` : ""}
         <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px"><div class="detail-row"><span class="detail-label">State</span>${badge(task.current_state, STATE_COLORS)}</div><div class="detail-row"><span class="detail-label">Priority</span>${badge(task.priority, PRIORITY_COLORS)}</div><div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${task.task_type}</span></div><div class="detail-row"><span class="detail-label">SLA</span><span style="color:${task.sla_breached ? "var(--red)" : "var(--green)"}">${task.sla_breached ? "BREACHED" : "OK"}</span></div><div class="detail-row"><span class="detail-label">Assignee</span><span style="color:${task.assigned_to_name ? "var(--text)" : "var(--text-muted)"}">${task.assigned_to_name || "Unassigned"}</span></div><div class="detail-row"><span class="detail-label">Created by</span><span class="detail-value">${task.created_by_name || "—"}</span></div><div class="detail-row"><span class="detail-label">AI Score</span><span class="detail-value">${task.ai_priority_score != null ? (task.ai_priority_score * 100).toFixed(0) + "%" : "—"}</span></div><div class="detail-row"><span class="detail-label">Est Hours</span><span class="detail-value">${detail.ai_estimated_hours || "—"}</span></div><div class="detail-row"><span class="detail-label">Due Date</span><span class="detail-value">${detail.due_date ? formatDate(detail.due_date) : "Not set"}</span></div><div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${formatDate(task.created_at)}</span></div></div>
         <div style="margin-top:10px"><span class="detail-label" style="font-size:11px">Tags: </span>${tags}</div>`;
          if(!isViewer()) {

                <div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:4px">Due Date</label><input id="edit-due" type="datetime-local" value="${detail.due_date ? new Date(detail.due_date).toISOString().slice(0, 16) : ""}" style="font-size:12px"></div>
                <div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:4px">Team</label><select id="edit-team" style="font-size:12px"><option value="">No team</option>${TEAMS.map((tm) => `<option value="${tm.id}" ${detail.team === tm.id ? "selected" : ""}>${tm.name}</option>`).join("")}</select></div>
                <div style="grid-column:1/-1"><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:4px">Tags</label><input id="edit-tags" value="${(detail.tags || []).join(", ")}" placeholder="backend, urgent" style="font-size:12px"></div>
              </div>
              <button class="btn btn-sm" style="background:var(--accent);color:#fff;margin-top:10px" onclick="saveTaskEdit('${taskId}')">SAVE CHANGES</button>
              <div id="edit-task-msg" style="margin-top:6px"></div></div>`;
            }
          if (isManagerOrAbove())
            h += `<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)"><h4 class="section-title">Assign Task</h4><div style="display:flex;gap:8px;flex-wrap:wrap"><select id="assign-user" style="flex:1;min-width:200px;max-width:100%"><option value="">Select engineer...</option>${uOpts}</select><button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="doAssign('${taskId}')">ASSIGN</button></div><div id="assign-msg" style="margin-top:8px"></div></div>`;

          await loadGlobalData();
          loadWorkflowsPage();
        } catch (e) {
          showErrorModal("Error", e.message);
        }
      }
      async function deleteWorkflow(id, name) {
        showModal(
          "Delete Workflow",
          `Delete <strong>${name}</strong>?<br><span style="color:var(--red)">Tasks using this workflow will be affected.</span>`,
          [
            {
              label: "CANCEL",
              color: "var(--text-muted)",
              onclick: "closeModal()",
            },
            {
              label: "DELETE",
              color: "var(--red)",
              onclick: `confirmDeleteWorkflow('${id}')`,
            },
          ],
        );
      }
      async function confirmDeleteWorkflow(id) {
        closeModal();
        try {
          await apiCall(`/workflows/${id}/`, "DELETE");
          showSuccessModal("Deleted", "Workflow removed");
          await loadGlobalData();
          loadWorkflowsPage();
        } catch (e) {
          showErrorModal("Error", e.message);
        }
      }

      // =================== TRANSITIONS ===================
      async function loadTransitionsPage() {
        try {
          const data = await apiCall("/transitions/");
          const tr = data.results || [];
          let h = `<div class="page-header"><div><h2 class="page-title">TRANSITION RULES</h2><p class="page-sub">${tr.length} rules</p></div>${isAdmin() ? '<button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="showCreateTransition()">+ NEW RULE</button>' : ""}</div><div id="create-trans-area"></div><div class="card" style="margin-top:20px"><div class="table-wrap"><table><thead><tr>${[
            "From",
            "",
            "To",
            "Roles",
            "Workflow",
            isAdmin() ? "Action" : "",
          ]
            .filter(Boolean)
            .map((x) => `<th class="no-sort">${x}</th>`)
            .join("")}</tr></thead><tbody>`;
          if (!tr.length)
            h += `<tr><td colspan="${isAdmin() ? 6 : 5}" class="empty-state">No rules</td></tr>`;
          else
            tr.forEach((t) => {
              const wf = WORKFLOWS.find((w) => w.id === t.workflow);
              h += `<tr><td>${badge(t.from_state, STATE_COLORS)}</td><td style="text-align:center;color:var(--text-muted)">→</td><td>${badge(t.to_state, STATE_COLORS)}</td><td>${(t.allowed_roles || []).map((r) => badge(r, ROLE_COLORS)).join(" ")}</td><td style="color:var(--text-dim);font-size:11px">${wf?.name || "—"}</td>${isAdmin() ? `<td><button class="btn btn-sm btn-danger" onclick="deleteTransition('${t.id}','${t.from_state}','${t.to_state}')">✕</button></td>` : ""}</tr>`;
            });
          h += `</tbody></table></div></div>`;
          $("page-transitions").innerHTML = h;
        } catch (e) {
          $("page-transitions").innerHTML =
            `<div class="msg msg-error">${e.message}</div>`;
        }
      }
      function showCreateTransition() {
          const wfOpts = WORKFLOWS.map(
              (w) => `<option value="${w.id}">${w.name}</option>`,
          ).join("");
          const firstWf = WORKFLOWS[0];
          const firstStates = firstWf?.allowed_states || STATES;
          const stOpts = firstStates.map(
              (s) => `<option value="${s}">${s.replace(/_/g, " ")}</option>`,
          ).join("");
          const rCb = ORG_ROLES.map(
              (r, i) =>
                  `<label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer"><input type="checkbox" value="${r}" class="tr-cb" ${i < ORG_ROLES.length - 1 ? "checked" : ""}> ${r.replace(/_/g, " ")}</label>`,
          ).join(" ");
          $("create-trans-area").innerHTML =
              `<div class="card" style="margin-top:14px"><h3 style="font-size:12px;font-weight:600;margin:0 0 14px;color:var(--accent)">New Rule</h3><div class="grid-2" style="gap:12px"><div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:6px">Workflow</label><select id="nt-wf" onchange="updateTransitionStates()">${wfOpts}</select></div><div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:6px">Roles</label><div style="display:flex;gap:12px;flex-wrap:wrap">${rCb}</div></div><div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:6px">From</label><select id="nt-from">${stOpts}</select></div><div><label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:6px">To</label><select id="nt-to">${stOpts}</select></div></div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="createTransition()">CREATE</button><button class="btn btn-sm btn-outline" onclick="$('create-trans-area').innerHTML=''">CANCEL</button></div></div>`;
          }
        function updateTransitionStates() {
            const wfId = $("nt-wf").value;
            const wf = WORKFLOWS.find(w => w.id === wfId);
            const states = wf?.allowed_states || STATES;
            const opts = states.map(s => `<option value="${s}">${s.replace(/_/g, " ")}</option>`).join("");
            $("nt-from").innerHTML = opts;
            $("nt-to").innerHTML = opts;
        }

      async function createTransition() {
        const roles = [...document.querySelectorAll(".tr-cb:checked")].map(
          (c) => c.value,
        );
        try {
          await apiCall("/transitions/", "POST", {
            from_state: $("nt-from").value,
            to_state: $("nt-to").value,
            workflow: $("nt-wf").value,
            allowed_roles: roles,
          });
          showSuccessModal("Success", "Rule created!");
          $("create-trans-area").innerHTML = "";
          loadTransitionsPage();
        } catch (e) {
          showErrorModal("Error", e.message);
        }
      }
      async function deleteTransition(id, f, t) {
        showModal(
          "Delete Rule",
          `Delete <strong>${f.replace(/_/g, " ")} → ${t.replace(/_/g, " ")}</strong>?`,
          [
            {
              label: "CANCEL",
              color: "var(--text-muted)",
              onclick: "closeModal()",
            },
            {
              label: "DELETE",
              color: "var(--red)",
              onclick: `confirmDeleteTrans('${id}')`,
            },
          ],
        );
      }
      async function confirmDeleteTrans(id) {
        closeModal();
        try {
          await apiCall(`/transitions/${id}/`, "DELETE");
          showSuccessModal("Deleted", "Rule removed");
          loadTransitionsPage();
        } catch (e) {
          showErrorModal("Error", e.message);
        }
      }

      // =================== AI ===================
      function loadAIPage() {
        const tOpts = TASKS.map((t) => {
          const short =
            t.title.length > 30 ? t.title.slice(0, 30) + "…" : t.title;
          return `<option value="${t.id}">${t.task_key} · ${short} ${t.assigned_to_name ? "[" + t.assigned_to_name + "]" : "[—]"}</option>`;
        }).join("");
        $("page-ai").innerHTML =
          `<h2 class="page-title">AI ENGINE</h2><p class="page-sub">Priority scoring, task routing, natural language queries</p><div class="card" style="margin-top:20px"><h3 style="font-size:12px;font-weight:600;margin:0 0 12px;color:var(--purple)">⚡ Natural Language Query</h3><p style="color:var(--text-muted);font-size:11px;margin-bottom:12px">Ask: "critical bugs", "unassigned tasks", "tasks assigned to dev_alice"</p><div style="display:flex;gap:10px;flex-wrap:wrap"><input id="nl-input" style="flex:1;min-width:200px" placeholder='Try: "high priority bugs"'><button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="doNLQuery()">QUERY</button></div><div id="nl-result"></div></div><div class="grid-2" style="margin-top:14px"><div class="card" style="overflow:hidden"><h3 style="font-size:12px;font-weight:600;margin:0 0 12px;color:var(--amber)">🎯 Priority Scoring</h3><select id="score-task" style="margin-bottom:10px"><option value="">Select task...</option>${tOpts}</select><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-sm" style="background:var(--amber);color:#fff" onclick="doScore()">SCORE</button><button class="btn btn-sm" style="background:transparent;border:1px solid var(--amber);color:var(--amber)" onclick="doScoreAll()">SCORE ALL</button></div><div id="score-result"></div></div><div class="card" style="overflow:hidden"><h3 style="font-size:12px;font-weight:600;margin:0 0 12px;color:var(--green)">🤖 Smart Routing</h3><select id="route-task" style="margin-bottom:10px"><option value="">Select task...</option>${tOpts}</select><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-sm" style="background:var(--green);color:#fff" onclick="doRoute()">RECOMMEND</button>${isManagerOrAbove() ? `<button class="btn btn-sm" style="background:transparent;border:1px solid var(--green);color:var(--green)" onclick="doAutoAssign()">AUTO-ASSIGN</button>` : ""}</div><div id="route-result"></div></div></div>`;
        $("nl-input").addEventListener("keydown", (e) => {
          if (e.key === "Enter") doNLQuery();
        });
      }
      async function doNLQuery() {
        const q = $("nl-input").value;
        if (!q) return;
        try {
          const d = await apiCall("/ai/query/", "POST", { question: q });
          let h = `<div class="msg msg-info" style="margin-top:14px">${d.explanation}</div>`;
          if (d.parsed_filters && Object.keys(d.parsed_filters).length)
            h += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${Object.entries(
              d.parsed_filters,
            )
              .map(
                ([k, v]) =>
                  `<span class="badge" style="background:rgba(139,92,246,0.1);color:var(--purple);border:1px solid rgba(139,92,246,0.2)">${k}: ${v}</span>`,
              )
              .join("")}</div>`;
          if (d.results?.length) {
            h += `<div class="table-wrap"><table><thead><tr>${["Key", "Title", "State", "Priority", "Assignee"].map((x) => `<th class="no-sort">${x}</th>`).join("")}</tr></thead><tbody>`;
            d.results.forEach((t) => {
              h += `<tr class="clickable" onclick="goToTask('${t.task_key}')"><td style="color:var(--accent);font-weight:600;font-size:12px">${t.task_key}</td><td>${t.title}</td><td>${badge(t.state, STATE_COLORS)}</td><td>${badge(t.priority, PRIORITY_COLORS)}</td><td style="color:var(--text-dim)">${t.assigned_to || "—"}</td></tr>`;
            });
            h += `</tbody></table></div>`;
          } else h += `<div class="empty-state">No matches</div>`;
          $("nl-result").innerHTML = h;
        } catch {
          $("nl-result").innerHTML =
            `<div class="msg msg-error" style="margin-top:14px">Failed</div>`;
        }
      }
      async function doScore() {
        const id = $("score-task").value;
        if (!id) return;
        try {
          const d = await apiCall("/ai/score-priority/", "POST", {
            task_id: id,
          });
          const s = d.priority_analysis;
          const c =
            s.score >= 0.7
              ? "var(--red)"
              : s.score >= 0.4
                ? "var(--amber)"
                : "var(--green)";
          let h = `<div style="margin-top:14px;padding:14px;background:var(--bg);border-radius:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;font-weight:600">${d.task_key}</span><span style="font-size:20px;font-weight:700;color:${c}">${(s.score * 100).toFixed(0)}%</span></div><p style="font-size:11px;color:var(--accent);margin:0 0 8px">${s.explanation}</p><p style="font-size:11px;color:var(--text-dim);margin:0 0 10px">Est: ${d.estimated_hours}h</p>`;
          Object.entries(s.factors || {}).forEach(([k, v]) => {
            const fc =
              v >= 0.7
                ? "var(--red)"
                : v >= 0.4
                  ? "var(--amber)"
                  : "var(--green)";
            h += `<div class="score-bar"><span class="score-bar-label">${k.replace(/_/g, " ")}</span><div class="score-bar-track"><div class="score-bar-fill" style="width:${v * 100}%;background:${fc}"></div></div><span class="score-bar-value">${(v * 100).toFixed(0)}%</span></div>`;
          });
          h += `</div>`;
          $("score-result").innerHTML = h;
          await loadGlobalData();
        } catch {
          $("score-result").innerHTML =
            `<div class="msg msg-error" style="margin-top:14px">Failed</div>`;
        }
      }
      async function doScoreAll() {
        try {
          const d = await apiCall("/ai/score-all/", "POST");
          let h = `<div class="msg msg-success" style="margin-top:14px">${d.scored_count} scored</div><div style="max-height:200px;overflow-y:auto">`;
          (d.results || []).forEach((r) => {
            const c =
              r.score >= 0.7
                ? "var(--red)"
                : r.score >= 0.4
                  ? "var(--amber)"
                  : "var(--green)";
            h += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(30,41,59,0.03);font-size:11px"><span style="color:var(--accent)">${r.task_key}</span><span style="color:${c};font-weight:600">${(r.score * 100).toFixed(0)}%</span></div>`;
          });
          h += `</div>`;
          $("score-result").innerHTML = h;
          await loadGlobalData();
        } catch {
          $("score-result").innerHTML =
            `<div class="msg msg-error" style="margin-top:14px">Failed</div>`;
        }
      }
      async function doRoute() {
        const id = $("route-task").value;
        if (!id) return;
        try {
          const d = await apiCall("/ai/recommend-assignee/", "POST", {
            task_id: id,
          });
          let h = `<div style="margin-top:14px">`;
          (d.recommendations || []).forEach((r, i) => {
            const c =
              r.total_score >= 0.7
                ? "var(--green)"
                : r.total_score >= 0.4
                  ? "var(--amber)"
                  : "var(--red)";
            h += `<div class="rec-card ${i === 0 ? "top" : ""}"><div style="display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap"><span style="font-size:12px;font-weight:600">${i === 0 ? "👑 " : ""}${r.username}</span><span style="font-size:14px;font-weight:700;color:${c}">${(r.total_score * 100).toFixed(0)}%</span></div><p style="font-size:10px;color:var(--text-dim);margin:0 0 6px">${r.reasoning}</p><div style="display:flex;gap:6px;flex-wrap:wrap">${Object.entries(
              r.factors || {},
            )
              .map(([k, v]) => {
                const fc =
                  v >= 0.7 ? "#10b981" : v >= 0.4 ? "#f59e0b" : "#ef4444";
                return `<span class="badge" style="background:${fc}18;color:${fc};border:1px solid ${fc}30">${k.replace(/_/g, " ")}: ${(v * 100).toFixed(0)}%</span>`;
              })
              .join("")}</div></div>`;
          });
          h += `</div>`;
          $("route-result").innerHTML = h;
        } catch {
          $("route-result").innerHTML =
            `<div class="msg msg-error" style="margin-top:14px">Failed</div>`;
        }
      }
      async function doAutoAssign() {
        const id = $("route-task").value;
        if (!id) return;
        try {
          const d = await apiCall("/ai/auto-assign/", "POST", { task_id: id });
          showSuccessModal("Auto-Assigned", d.message);
          await loadGlobalData();
          loadAIPage();
        } catch (e) {
          let m = e.message;
          try {
            const p = JSON.parse(m);
            m = p.error || m;
          } catch {}
          showErrorModal("Auto-Assign Failed", m);
        }
      }

      // =================== AUDIT ===================
      async function loadAuditPage() {
        try {
          const data = await apiCall("/audit-logs/");
          const logs = data.results || [];
          let h = `<div><h2 class="page-title">AUDIT LOGS</h2><p class="page-sub">${logs.length} entries</p></div><div style="margin-top:20px">`;
          if (!logs.length) h += `<div class="card empty-state">No logs</div>`;
          else
            logs.forEach((l) => {
              const tk = TASKS.find((t) => t.id === l.task);
              const icon = ACTION_ICONS[l.action] || "📝";
              const ac =
                {
                  created: "var(--green)",
                  state_changed: "var(--amber)",
                  assigned: "var(--purple)",
                  commented: "var(--cyan)",
                  sla_breached: "var(--red)",
                  updated: "var(--accent)",
                  deleted: "var(--red)",
                }[l.action] || "var(--text-dim)";
              let oH = "—",
                nH = "—";
              if (l.old_value)
                oH = Object.entries(l.old_value)
                  .map(
                    ([k, v]) =>
                      `<span style="color:var(--red)">${k}:</span> ${v}`,
                  )
                  .join("<br>");
              if (l.new_value)
                nH = Object.entries(l.new_value)
                  .map(
                    ([k, v]) =>
                      `<span style="color:var(--green)">${k}:</span> ${v}`,
                  )
                  .join("<br>");
              h += `<div class="card" style="margin-bottom:8px;padding:14px 20px"><div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-size:16px">${icon}</span><span class="link" style="font-size:12px" onclick="goToTask('${l.task}')">${tk?.task_key || "—"}</span></div><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span class="badge" style="background:${ac}18;color:${ac};border:1px solid ${ac}30">${l.action.replace(/_/g, " ")}</span><span style="font-size:11px;color:var(--text-dim)">by <strong>${l.performed_by_name || "System"}</strong></span><span style="font-size:10px;color:var(--text-muted)">${formatDate(l.timestamp)}</span></div></div><div class="grid-2"><div style="padding:10px;background:rgba(239,68,68,0.04);border-radius:6px;border:1px solid rgba(239,68,68,0.08)"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-bottom:6px;font-weight:600">Previous</div><div style="font-size:11px;line-height:1.6;word-break:break-word">${oH}</div></div><div style="padding:10px;background:rgba(16,185,129,0.04);border-radius:6px;border:1px solid rgba(16,185,129,0.08)"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:6px;font-weight:600">New</div><div style="font-size:11px;line-height:1.6;word-break:break-word">${nH}</div></div></div>${l.reason ? `<div style="margin-top:8px;font-size:11px;color:var(--text-dim)">↳ ${l.reason}</div>` : ""}</div>`;
            });
          h += `</div>`;
          $("page-audit").innerHTML = h;
        } catch (e) {
          $("page-audit").innerHTML =
            `<div class="msg msg-error">${e.message}</div>`;
        }
      }

      // =================== COMMENTS ===================
      async function loadCommentsPage() {
        try {
          const data = await apiCall("/comments/");
          let comments = data.results || [];
          comments.sort(
            (a, b) => new Date(b.created_at) - new Date(a.created_at),
          );
          let h = `<div><h2 class="page-title">COMMENTS</h2><p class="page-sub">${comments.length} comments</p></div><div class="card" style="margin-top:20px">`;
          if (!comments.length)
            h += `<div class="empty-state">No comments</div>`;
          else
            comments.forEach((c) => {
              const tk = TASKS.find((t) => t.id === c.task);
              h += `<div class="activity-item"><span style="font-size:14px">💬</span><div style="flex:1"><div style="display:flex;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap"><span class="link" style="font-size:12px" onclick="goToTask('${c.task}')">${tk?.task_key || "—"}</span><span style="color:var(--purple);font-size:11px;font-weight:600">${c.author_name}</span></div><div style="font-size:12px;color:var(--text-dim)">${c.content}</div></div><span style="color:var(--text-muted);font-size:10px;white-space:nowrap">${timeAgo(c.created_at)}</span></div>`;
            });
          h += `</div>`;
          $("page-comments").innerHTML = h;
        } catch (e) {
          $("page-comments").innerHTML =
            `<div class="msg msg-error">${e.message}</div>`;
        }
      }
    </script>
  </body>
</html>
