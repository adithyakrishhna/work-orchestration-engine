<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Orchestrator — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17; --surface: #111827; --surface-hover: #1a2234;
            --border: #1e293b; --border-light: #334155;
            --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
            --green: #10b981; --red: #ef4444; --amber: #f59e0b; --purple: #8b5cf6; --cyan: #06b6d4;
            --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
        }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); font-size: 13px; }
        .hidden { display: none !important; }

        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 30% 20%, var(--accent-glow), transparent 50%), var(--bg); padding: 20px; }
        .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; width: 380px; max-width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

        input, select, textarea { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-sm { padding: 7px 16px; font-size: 11px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }

        .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 20; overflow-y: auto; transition: transform 0.3s; }
        .main { margin-left: 220px; padding: 28px 32px; min-height: 100vh; transition: margin-left 0.3s; }
        .menu-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 30; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 20px; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 15; }

        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 18px; cursor: pointer; border-radius: 8px; margin: 2px 10px; color: var(--text-dim); font-size: 12px; transition: all 0.15s; border: 1px solid transparent; }
        .nav-item:hover { background: var(--surface-hover); }
        .nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; border-color: rgba(59,130,246,0.13); }
        .nav-section { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 16px 18px 6px; font-weight: 600; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .stat-card { display: flex; align-items: center; gap: 16px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
        .stat-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.08); }
        .stat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .stat-value { font-size: 22px; font-weight: 700; line-height: 1.1; }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 10px 14px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600; }
        td { padding: 12px 14px; border-bottom: 1px solid rgba(30,41,59,0.03); vertical-align: middle; }
        tr.clickable { cursor: pointer; transition: background 0.1s; }
        tr.clickable:hover { background: var(--surface-hover); }
        .table-wrap { overflow-x: auto; }

        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 0 0 14px; font-weight: 600; }
        .page-title { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
        .page-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .progress-bg { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

        .activity-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .activity-item + .activity-item { border-top: 1px solid rgba(30,41,59,0.03); }

        .msg { padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
        .msg-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); color: var(--red); }
        .msg-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.15); color: var(--green); }
        .msg-info { background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.13); color: var(--purple); }

        .score-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .score-bar-label { font-size: 10px; color: var(--text-muted); width: 100px; }
        .score-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
        .score-bar-fill { height: 100%; border-radius: 2px; }
        .score-bar-value { font-size: 10px; color: var(--text-dim); width: 30px; text-align: right; }

        .transition-btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; background: transparent; color: var(--text-dim); border: 1px solid var(--border); transition: all 0.15s; }
        .transition-btn:hover { border-color: var(--accent); color: var(--accent); }

        .rec-card { padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); background: var(--bg); }
        .ai-card select { max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
        .rec-card.top { background: rgba(16,185,129,0.04); border-color: rgba(16,185,129,0.13); }

        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(30,41,59,0.05); font-size: 12px; }
        .detail-label { color: var(--text-muted); }
        .detail-value { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: var(--accent-glow); color: var(--accent); margin: 2px; border: 1px solid rgba(59,130,246,0.15); }
        .empty-state { color: var(--text-muted); font-size: 12px; text-align: center; padding: 40px 20px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 420px; max-width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
        .modal-body { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .clickable-bar { cursor: pointer; transition: opacity 0.15s; }
        .clickable-bar:hover { opacity: 0.8; }

        @media (max-width: 1400px) { .grid-5 { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 1024px) {
            .grid-5 { grid-template-columns: repeat(2, 1fr); }
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main { margin-left: 0; padding: 20px 16px; padding-top: 56px; }
            .menu-toggle { display: block; }
        }
        @media (max-width: 640px) {
            .grid-5, .grid-3, .grid-2 { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .login-box { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<div id="modal-container"></div>
<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
    <div class="login-box">
        <div style="text-align:center;margin-bottom:32px">
            <div style="font-size:28px;margin-bottom:6px">⚡</div>
            <h1 style="font-size:18px;font-weight:700;letter-spacing:1px">WORK ORCHESTRATOR</h1>
            <p style="color:var(--text-muted);font-size:11px;margin-top:8px;letter-spacing:0.5px">AI-POWERED WORKFLOW ENGINE</p>
        </div>
        <div id="login-error" class="msg msg-error hidden"></div>
        <div style="margin-bottom:14px">
            <label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px">Username</label>
            <input id="login-user" placeholder="admin_user">
        </div>
        <div style="margin-bottom:24px">
            <label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px">Password</label>
            <input id="login-pass" type="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">SIGN IN →</button>
        <p style="text-align:center;color:var(--text-muted);font-size:10px;margin-top:20px">Test: admin_user / testpass123</p>
    </div>
</div>

<!-- APP -->
<div id="app-shell" class="hidden">
    <div class="sidebar" id="sidebar">
        <div style="padding:22px 18px 20px;border-bottom:1px solid var(--border)">
            <div style="font-size:13px;font-weight:700;letter-spacing:1px">⚡ ORCHESTRATOR</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:0.5px">WORKFLOW ENGINE v1.0</div>
        </div>
        <div style="padding:10px 0;flex:1">
            <div class="nav-section">Overview</div>
            <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')"><span>◆</span> Dashboard</div>
            <div class="nav-section" style="margin-top:8px">Management</div>
            <div class="nav-item" data-page="tasks" onclick="switchPage('tasks')"><span>☰</span> Tasks</div>
            <div class="nav-item" data-page="users" onclick="switchPage('users')"><span>👥</span> Users</div>
            <div class="nav-item" data-page="teams" onclick="switchPage('teams')"><span>🏢</span> Teams</div>
            <div class="nav-item" data-page="organizations" onclick="switchPage('organizations')"><span>🏛</span> Organizations</div>
            <div class="nav-section" style="margin-top:8px">Configuration</div>
            <div class="nav-item" data-page="workflows" onclick="switchPage('workflows')"><span>🔀</span> Workflows</div>
            <div class="nav-item" data-page="transitions" onclick="switchPage('transitions')"><span>→</span> Transitions</div>
            <div class="nav-section" style="margin-top:8px">Intelligence</div>
            <div class="nav-item" data-page="ai" onclick="switchPage('ai')"><span>⚡</span> AI Engine</div>
            <div class="nav-section" style="margin-top:8px">History</div>
            <div class="nav-item" data-page="audit" onclick="switchPage('audit')"><span>📜</span> Audit Logs</div>
            <div class="nav-item" data-page="comments" onclick="switchPage('comments')"><span>💬</span> Comments</div>
        </div>
        <div style="padding:16px 18px;border-top:1px solid var(--border)">
            <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px"><span style="color:var(--green)">●</span> <span id="current-user"></span></div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px" id="current-role"></div>
            <button class="btn btn-outline" style="width:100%;padding:7px;font-size:10px;letter-spacing:0.5px" onclick="doLogout()">SIGN OUT</button>
        </div>
    </div>

    <div class="main" id="main-content">
        <div id="global-msg"></div>
        <div id="page-dashboard"></div>
        <div id="page-tasks" class="hidden"></div>
        <div id="page-users" class="hidden"></div>
        <div id="page-teams" class="hidden"></div>
        <div id="page-organizations" class="hidden"></div>
        <div id="page-workflows" class="hidden"></div>
        <div id="page-transitions" class="hidden"></div>
        <div id="page-ai" class="hidden"></div>
        <div id="page-audit" class="hidden"></div>
        <div id="page-comments" class="hidden"></div>
    </div>
</div>

<script>
const API = 'http://127.0.0.1:8000/api/v1';
let TOKEN = null;
let TASKS=[], WORKFLOWS=[], ALL_USERS=[], TEAMS=[], ORGS=[], CURRENT_USER={};
let PENDING_FILTER = null;

const STATE_COLORS = {open:'#3b82f6',in_progress:'#f59e0b',review:'#8b5cf6',testing:'#06b6d4',done:'#10b981',cancelled:'#64748b'};
const PRIORITY_COLORS = {critical:'#ef4444',high:'#f59e0b',medium:'#3b82f6',low:'#64748b'};
const ROLE_COLORS = {admin:'#ef4444',manager:'#f59e0b',engineer:'#3b82f6',viewer:'#64748b'};
const ACTION_ICONS = {created:'🆕',state_changed:'🔄',assigned:'👤',commented:'💬',sla_breached:'🔴',updated:'📝',deleted:'🗑'};
const ALL_PAGES = ['dashboard','tasks','users','teams','organizations','workflows','transitions','ai','audit','comments'];

// =================== HELPERS ===================
function $(id) { return document.getElementById(id); }
function badge(text, colorMap) { const c=(colorMap||{})[text]||'#64748b'; return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30">${(text||'—').replace(/_/g,' ')}</span>`; }
function timeAgo(ts) { if(!ts) return '—'; const d=new Date(ts),now=new Date(),diff=(now-d)/1000; if(diff<60) return 'just now'; if(diff<3600) return Math.floor(diff/60)+'m ago'; if(diff<86400) return Math.floor(diff/3600)+'h ago'; return Math.floor(diff/86400)+'d ago'; }
function formatDate(ts) { return ts ? new Date(ts).toLocaleString() : '—'; }
function isAdmin() { return CURRENT_USER.role === 'admin'; }
function isManagerOrAbove() { return CURRENT_USER.role === 'admin' || CURRENT_USER.role === 'manager'; }
function showGlobalMsg(msg, isError) { $('global-msg').innerHTML=`<div class="msg ${isError?'msg-error':'msg-success'}">${msg}</div>`; setTimeout(()=>$('global-msg').innerHTML='',4000); }
function showMsg(elId, msg, isError) { const el=$(elId); if(el){el.innerHTML=`<div class="msg ${isError?'msg-error':'msg-success'}">${msg}</div>`; setTimeout(()=>el.innerHTML='',3000);} }
function statCard(icon,label,value,color,sub='',onclick='') { return `<div class="card stat-card" onclick="${onclick}"><div class="stat-icon" style="background:${color}15;border:1px solid ${color}25">${icon}</div><div><div class="stat-value">${value}</div><div class="stat-label">${label}</div>${sub?`<div style="font-size:11px;color:${color};margin-top:2px">${sub}</div>`:''}</div></div>`; }

// =================== MODAL ===================
function showModal(title, body, actions) {
    const actionsHTML = actions.map(a => `<button class="btn btn-sm" style="background:${a.color||'var(--accent)'};color:#fff" onclick="${a.onclick}">${a.label}</button>`).join('');
    $('modal-container').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box"><div class="modal-title">${title}</div><div class="modal-body">${body}</div><div class="modal-actions">${actionsHTML}</div></div></div>`;
}
function showErrorModal(title, message) { showModal(title, `<div style="color:var(--red)">${message}</div>`, [{label:'OK', color:'var(--red)', onclick:'closeModal()'}]); }
function showSuccessModal(title, message) { showModal(title, `<div style="color:var(--green)">${message}</div>`, [{label:'OK', color:'var(--green)', onclick:'closeModal()'}]); }
function closeModal() { $('modal-container').innerHTML = ''; }

// =================== SIDEBAR ===================
function toggleSidebar() { $('sidebar').classList.toggle('open'); $('sidebar-overlay').classList.toggle('open'); }

// =================== API ===================
async function apiCall(endpoint, method='GET', body=null) {
    const opts = { method, headers: { 'Content-Type':'application/json' } };
    if (TOKEN) opts.headers['Authorization'] = `Bearer ${TOKEN}`;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, opts);
    if (res.status === 401) {
        // Try refresh
        const refreshed = await tryRefreshToken();
        if (refreshed) { opts.headers['Authorization'] = `Bearer ${TOKEN}`; const retry = await fetch(API+endpoint, opts); if(!retry.ok) throw new Error(await retry.text()); return retry.json(); }
        doLogout(); throw new Error('Session expired');
    }
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(typeof err === 'string' ? err : JSON.stringify(err)); }
    return res.json();
}

async function tryRefreshToken() {
    const refresh = sessionStorage.getItem('refresh_token');
    if (!refresh) return false;
    try {
        const res = await fetch(API+'/auth/refresh/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({refresh}) });
        if (!res.ok) return false;
        const data = await res.json();
        TOKEN = data.access;
        sessionStorage.setItem('access_token', TOKEN);
        return true;
    } catch { return false; }
}

// =================== AUTH ===================
async function doLogin() {
    const user = $('login-user').value, pass = $('login-pass').value, errEl = $('login-error');
    try {
        const data = await apiCall('/auth/login/','POST',{username:user,password:pass});
        if (data.access) {
            TOKEN = data.access;
            sessionStorage.setItem('access_token', TOKEN);
            sessionStorage.setItem('refresh_token', data.refresh);
            $('login-screen').classList.add('hidden');
            $('app-shell').classList.remove('hidden');
            await loadGlobalData();
            loadDashboard();
        } else { errEl.textContent='Invalid credentials'; errEl.classList.remove('hidden'); }
    } catch { errEl.textContent='Connection failed — is the server running?'; errEl.classList.remove('hidden'); }
}
function doLogout() { TOKEN=null; sessionStorage.removeItem('access_token'); sessionStorage.removeItem('refresh_token'); $('app-shell').classList.add('hidden'); $('login-screen').classList.remove('hidden'); }

// Auto-login on refresh
async function tryAutoLogin() {
    const savedToken = sessionStorage.getItem('access_token');
    if (savedToken) {
        TOKEN = savedToken;
        try {
            await apiCall('/users/me/');
            $('login-screen').classList.add('hidden');
            $('app-shell').classList.remove('hidden');
            await loadGlobalData();
            loadDashboard();
        } catch { TOKEN=null; sessionStorage.removeItem('access_token'); sessionStorage.removeItem('refresh_token'); }
    }
}
window.addEventListener('DOMContentLoaded', tryAutoLogin);

$('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
$('login-user').addEventListener('keydown', e => { if(e.key==='Enter') $('login-pass').focus(); });

// =================== GLOBAL DATA ===================
async function loadGlobalData() {
    try {
        const [me,taskData,wfData,userData,teamData,orgData] = await Promise.all([
            apiCall('/users/me/'), apiCall('/tasks/'), apiCall('/workflows/'),
            apiCall('/users/'), apiCall('/teams/'), apiCall('/organizations/')
        ]);
        CURRENT_USER=me; TASKS=taskData.results||[]; WORKFLOWS=wfData.results||[];
        ALL_USERS=userData.results||[]; TEAMS=teamData.results||[]; ORGS=orgData.results||[];
        $('current-user').textContent=me.username||'';
        $('current-role').textContent=(me.role||'').toUpperCase();
    } catch(e) { showGlobalMsg('Failed to load: '+e.message, true); }
}

// =================== NAV ===================
function switchPage(page) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
    ALL_PAGES.forEach(p => $(('page-'+p)).classList.toggle('hidden', p!==page));
    if(window.innerWidth<=1024) { $('sidebar').classList.remove('open'); $('sidebar-overlay').classList.remove('open'); }
    const loaders = { dashboard:loadDashboard, tasks:loadTasksPage, users:loadUsersPage, teams:loadTeamsPage, organizations:loadOrgsPage, workflows:loadWorkflowsPage, transitions:loadTransitionsPage, ai:loadAIPage, audit:loadAuditPage, comments:loadCommentsPage };
    if(loaders[page]) loaders[page]();
}

// =================== DASHBOARD ===================
async function loadDashboard() {
    try {
        const [dash,perf,act] = await Promise.all([apiCall('/dashboard/overview/'), apiCall('/dashboard/team-performance/'), apiCall('/dashboard/activity/')]);
        const o=dash.overview||{}, s=dash.sla||{}, tp=perf.team_performance||[], ac=act.recent_activity||[];
        const active = (o.total_tasks||0)-(o.by_state?.done||0)-(o.by_state?.cancelled||0);

        let html = `<div><h2 class="page-title">COMMAND CENTER</h2><p class="page-sub">Real-time overview · Click stats to filter tasks</p></div>`;
        html += `<div class="grid-5" style="margin-top:20px">
            ${statCard('📋','Total Tasks',o.total_tasks||0,'#3b82f6','',"goTasksFiltered('all')")}
            ${statCard('⚡','Active',active,'#f59e0b',`${o.last_7_days?.created||0} new this week`,"goTasksFiltered('active')")}
            ${statCard('✅','Completed',o.by_state?.done||0,'#10b981',`${o.last_7_days?.completed||0} this week`,"goTasksFiltered('state','done')")}
            ${statCard('🔴','SLA Breached',s.breached||0,'#ef4444',s.breach_rate?s.breach_rate+'% rate':'',"goTasksFiltered('sla')")}
            ${statCard('👤','Unassigned',o.unassigned||0,'#8b5cf6','',"goTasksFiltered('unassigned')")}
        </div>`;

        html += `<div class="grid-3" style="margin-top:14px">
            <div class="card"><h3 class="section-title">Tasks by State</h3>${stateHTML}</div>
            <div class="card"><h3 class="section-title">Tasks by Priority</h3>${prioHTML}</div>
            <div class="card"><h3 class="section-title">Team Workload</h3>${teamHTML}</div>
        </div>`;

        html += `<div class="grid-2" style="margin-top:14px">
            <div class="card"><h3 class="section-title">SLA Health</h3>
                <div class="detail-row"><span class="detail-label">Healthy</span><span style="color:var(--green)">${s.healthy||0}</span></div>
                <div class="detail-row"><span class="detail-label">At Risk (&lt;24h)</span><span style="color:var(--amber)">${s.at_risk||0}</span></div>
                <div class="detail-row"><span class="detail-label">Breached</span><span style="color:var(--red)">${s.breached||0}</span></div>
                <button class="btn btn-sm btn-outline" style="margin-top:14px;width:100%" onclick="runSLACheck()">🔍 RUN SLA CHECK</button>
            </div>

                <div class="detail-row"><span class="detail-label">Workflows</span><span class="detail-value">${WORKFLOWS.length}</span></div>

        const actHTML = ac.slice(0,10).map(a => `<div class="activity-item"><span style="font-size:14px">${ACTION_ICONS[a.action]||'📝'}</span><div style="flex:1"><span style="color:var(--accent);font-weight:600;font-size:12px">${a.task_key}</span> <span style="color:var(--text-dim);font-size:12px">— ${a.action.replace(/_/g,' ')} by ${a.performed_by}</span>${a.reason?`<div style="font-size:10px;color:var(--text-muted);margin-top:2px">↳ ${a.reason}</div>`:''}</div><span style="color:var(--text-muted);font-size:10px">${timeAgo(a.timestamp)}</span></div>`).join('') || '<div class="empty-state">No activity</div>';

async function runSLACheck() { try { const r=await apiCall('/dashboard/sla-check/','POST'); showSuccessModal('SLA Check Complete', `Checked: ${r.results.checked}<br>Newly breached: ${r.results.breached}`); loadDashboard(); } catch { showErrorModal('Error','SLA check failed'); } }

// Dashboard -> Tasks with filter
function goTasksFiltered(type, value) {
    PENDING_FILTER = {type, value};
    switchPage('tasks');
}

// =================== TASKS ===================
async function loadTasksPage() { await loadGlobalData(); const f = PENDING_FILTER; PENDING_FILTER=null; if(f) applyPendingFilter(f); else renderTasks(); }

function applyPendingFilter(f) {
    if(f.type==='state') renderTasks(f.value,'',false,false);
    else if(f.type==='priority') renderTasks('',f.value,false,false);
    else if(f.type==='sla') renderTasks('','',true,false);
    else if(f.type==='unassigned') renderTasks('','',false,true);
    else if(f.type==='active') renderTasks('','',false,false,true);
    else renderTasks();
}

function renderTasks(filterState='', filterPriority='', filterSLA=false, filterUnassigned=false, filterActive=false) {
    let filtered = TASKS.filter(t => {
        if(filterState && t.current_state!==filterState) return false;
        if(filterPriority && t.priority!==filterPriority) return false;
        if(filterSLA && !t.sla_breached) return false;
        if(filterUnassigned && t.assigned_to_name) return false;
        if(filterActive && (t.current_state==='done'||t.current_state==='cancelled')) return false;
        return true;
    });
    let labels=[];
    if(filterState) labels.push('State: '+filterState.replace(/_/g,' '));
    if(filterPriority) labels.push('Priority: '+filterPriority);
    if(filterSLA) labels.push('SLA Breached');
    if(filterUnassigned) labels.push('Unassigned');
    if(filterActive) labels.push('Active Only');

    let html = `<div class="page-header"><div><h2 class="page-title">TASKS</h2><p class="page-sub">${filtered.length} tasks${labels.length?' · '+labels.join(', '):''}</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${labels.length?'<button class="btn btn-sm btn-outline" onclick="renderTasks()">✕ CLEAR</button>':''}
        <button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="toggleCreateTask()">+ NEW TASK</button></div></div>`;
    html += `<div id="create-task-form" class="card hidden" style="margin-top:14px"></div>`;
    html += `<div style="display:flex;gap:10px;margin:16px 0 14px;flex-wrap:wrap">
        <select style="width:150px" onchange="renderTasks(this.value,$('f-prio')?.value||'')"><option value="">All States</option>${['open','in_progress','review','testing','done','cancelled'].map(s=>`<option value="${s}" ${filterState===s?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}</select>
        <select id="f-prio" style="width:150px" onchange="renderTasks(document.querySelector('#page-tasks select').value,this.value)"><option value="">All Priorities</option>${['critical','high','medium','low'].map(p=>`<option value="${p}" ${filterPriority===p?'selected':''}>${p}</option>`).join('')}</select>
    </div><div id="task-msg"></div>`;

    html += `<div class="card"><div class="table-wrap"><table><thead><tr>${['Key','Title','State','Priority','Type','Assignee','AI','Created'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
    if(!filtered.length) html += `<tr><td colspan="8" class="empty-state">No tasks</td></tr>`;
    else filtered.forEach(t => {
        const ai = t.ai_priority_score!=null ? `<span style="color:${t.ai_priority_score>=0.7?'var(--red)':t.ai_priority_score>=0.4?'var(--amber)':'var(--green)'};font-weight:600">${(t.ai_priority_score*100).toFixed(0)}%</span>` : '<span style="color:var(--text-muted)">—</span>';
        html += `<tr class="clickable" onclick="showTaskDetail('${t.id}')"><td style="color:var(--accent);font-weight:600;font-size:12px">${t.task_key}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td><td>${badge(t.current_state,STATE_COLORS)}</td><td>${badge(t.priority,PRIORITY_COLORS)}</td><td style="color:var(--text-dim)">${t.task_type}</td><td style="color:${t.assigned_to_name?'var(--text)':'var(--text-muted)'}">${t.assigned_to_name||'—'}</td><td>${ai}</td><td style="color:var(--text-muted);font-size:11px">${timeAgo(t.created_at)}</td></tr>`;
    });
    html += `</tbody></table></div></div><div id="task-detail-panel"></div>`;
    $('page-tasks').innerHTML = html;
}

function toggleCreateTask() {
    const form=$('create-task-form'); form.classList.toggle('hidden');
    if(!form.classList.contains('hidden')) {
        form.innerHTML = `<h3 style="font-size:12px;font-weight:600;margin:0 0 14px;color:var(--accent)">Create New Task</h3>
            <div class="grid-2" style="gap:12px">
                <div style="grid-column:1/-1"><input id="new-title" placeholder="Task title..."></div>
                <div style="grid-column:1/-1"><textarea id="new-desc" style="min-height:70px;resize:vertical" placeholder="Description..."></textarea></div>
                <select id="new-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select>
                <select id="new-type"><option value="task">Task</option><option value="bug">Bug</option><option value="feature">Feature</option><option value="improvement">Improvement</option></select>
                <select id="new-workflow"><option value="">Workflow...</option>${WORKFLOWS.map(w=>`<option value="${w.id}">${w.name}</option>`).join('')}</select>
                <select id="new-team"><option value="">No team</option>${TEAMS.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>
                <div style="grid-column:1/-1"><input id="new-tags" placeholder="Tags (comma separated): backend, urgent"></div>
            </div>
            <div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="createTask()">CREATE</button><button class="btn btn-sm btn-outline" onclick="$('create-task-form').classList.add('hidden')">CANCEL</button></div>`;
    }
}

async function createTask() {
    const body = { title:$('new-title').value, description:$('new-desc').value, priority:$('new-priority').value, task_type:$('new-type').value, workflow:$('new-workflow').value||(WORKFLOWS[0]?.id||''), tags:$('new-tags').value?$('new-tags').value.split(',').map(t=>t.trim()).filter(Boolean):[] };
    if($('new-team').value) body.team=$('new-team').value;
    try { await apiCall('/tasks/','POST',body); await loadGlobalData(); renderTasks(); showSuccessModal('Success','Task created!'); } catch(e) { showErrorModal('Error','Create failed: '+e.message); }
}

async function showTaskDetail(taskId) {
    try {
        const task=TASKS.find(t=>t.id===taskId); if(!task) return;
        const [trans,detail] = await Promise.all([apiCall(`/tasks/${taskId}/available-transitions/`), apiCall(`/tasks/${taskId}/`)]);
        const avail=trans.available_transitions||[];
        const engineers=ALL_USERS.filter(u=>u.role==='engineer'||u.role==='manager');
        const userOpts=engineers.map(u=>{
            const assigned = TASKS.some(t=>t.assigned_to===u.id && t.current_state!=='done' && t.current_state!=='cancelled');
            const label = `${u.username} (${u.role}) — ${u.active_task_count}/${u.max_concurrent_tasks} tasks${u.id===task.assigned_to?' ✓ current':''}`;
            return `<option value="${u.id}" ${u.id===task.assigned_to?'selected':''}>${label}</option>`;
        }).join('');
        const tags=(detail.tags||[]).map(t=>`<span class="tag">${t}</span>`).join(' ')||'—';
        const comments=detail.comments||[];

        let html = `<div class="card" style="margin-top:14px">
            <div style="display:flex;justify-content:space-between;align-items:start"><h3 style="font-size:14px;font-weight:700;color:var(--accent)">${task.task_key}</h3><button class="btn btn-outline" style="padding:4px 12px;font-size:14px" onclick="$('task-detail-panel').innerHTML=''">×</button></div>
            <p style="font-size:13px;font-weight:500;margin:8px 0 4px">${task.title}</p>
            ${detail.description?`<p style="font-size:11px;color:var(--text-dim);margin-bottom:14px">${detail.description}</p>`:''}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">
                <div class="detail-row"><span class="detail-label">State</span>${badge(task.current_state,STATE_COLORS)}</div>
                <div class="detail-row"><span class="detail-label">Priority</span>${badge(task.priority,PRIORITY_COLORS)}</div>
                <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${task.task_type}</span></div>
                <div class="detail-row"><span class="detail-label">SLA</span><span style="color:${task.sla_breached?'var(--red)':'var(--green)'}">${task.sla_breached?'BREACHED':'OK'}</span></div>
                <div class="detail-row"><span class="detail-label">Assignee</span><span style="color:${task.assigned_to_name?'var(--text)':'var(--text-muted)'}">${task.assigned_to_name||'Unassigned'}</span></div>
                <div class="detail-row"><span class="detail-label">Created by</span><span class="detail-value">${task.created_by_name||'—'}</span></div>
                <div class="detail-row"><span class="detail-label">AI Score</span><span class="detail-value">${task.ai_priority_score!=null?(task.ai_priority_score*100).toFixed(0)+'%':'—'}</span></div>
                <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${formatDate(task.created_at)}</span></div>
            </div>
            <div style="margin-top:10px"><span class="detail-label" style="font-size:11px">Tags: </span>${tags}</div>`;

        // Assign (managers and admins only)
        if(isManagerOrAbove()) {
            html += `<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)"><h4 class="section-title">Assign Task</h4>
                <div style="display:flex;gap:8px"><select id="assign-user" style="flex:1"><option value="">Select engineer...</option>${userOpts}</select>
                <button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="doAssign('${taskId}')">ASSIGN</button></div><div id="assign-msg" style="margin-top:8px"></div></div>`;
        }

        if(avail.length>0) {
            html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><h4 class="section-title">Transition State</h4>
                <div style="display:flex;flex-wrap:wrap;gap:6px">${avail.map(t=>`<button class="transition-btn" onclick="doTransition('${taskId}','${t.to_state}')">${t.to_state.replace(/_/g,' ')}</button>`).join('')}</div></div>`;
        }

        html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><h4 class="section-title">Comments (${comments.length})</h4>
            ${comments.map(c=>`<div style="padding:8px 0;border-bottom:1px solid rgba(30,41,59,0.05)"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px"><span style="color:var(--accent);font-weight:600">${c.author_name}</span><span style="color:var(--text-muted)">${timeAgo(c.created_at)}</span></div><div style="font-size:12px;color:var(--text-dim)">${c.content}</div></div>`).join('')||'<div style="color:var(--text-muted);font-size:11px;padding:8px 0">No comments</div>'}
            <div style="display:flex;gap:8px;margin-top:10px"><input id="new-comment" style="flex:1" placeholder="Add comment..."><button class="btn btn-sm" style="background:var(--cyan);color:#fff" onclick="addComment('${taskId}')">POST</button></div></div>`;

        html += `</div>`;
        $('task-detail-panel').innerHTML = html;
    } catch(e) { showErrorModal('Error','Failed to load task'); }
}

async function doAssign(taskId) {
    const userId=$('assign-user').value; if(!userId){showMsg('assign-msg','Select an engineer',true);return;}
    try { await apiCall(`/tasks/${taskId}/assign/`,'POST',{user_id:userId,reason:'Assigned via dashboard'}); showSuccessModal('Assigned','Task assigned successfully!'); await loadGlobalData(); setTimeout(()=>showTaskDetail(taskId),300); }
    catch(e) { showErrorModal('Assignment Failed', e.message); }
}

async function doTransition(taskId, toState) {
    showModal('Confirm Transition', `<div style="margin-bottom:14px">Move task to <strong>${toState.replace(/_/g,' ')}</strong>?</div><input id="transition-reason" placeholder="Reason (optional)" style="width:100%">`, [
        {label:'CANCEL', color:'var(--text-muted)', onclick:'closeModal()'},
        {label:'CONFIRM →', color:'var(--accent)', onclick:`confirmTransition('${taskId}','${toState}')`}
    ]);
}

async function confirmTransition(taskId, toState) {
    const reason = $('transition-reason')?.value || '';
    closeModal();
    try { await apiCall(`/tasks/${taskId}/transition/`,'POST',{to_state:toState,reason}); showSuccessModal('Success',`Transitioned to ${toState.replace(/_/g,' ')}`); await loadGlobalData(); renderTasks(); }
    catch(e) { let msg=e.message; try{msg=JSON.parse(msg); if(Array.isArray(msg)) msg=msg.join('<br>'); else if(typeof msg==='object') msg=Object.values(msg).flat().join('<br>');}catch{} showErrorModal('Transition Failed', msg); }
}

async function addComment(taskId) { const c=$('new-comment').value; if(!c) return; try { await apiCall('/comments/','POST',{task:taskId,content:c}); showTaskDetail(taskId); } catch { showErrorModal('Error','Comment failed'); } }

async function doNLQuery() { const q=$('nl-input').value; if(!q) return; try { const d=await apiCall('/ai/query/','POST',{question:q}); let h=`<div class="msg msg-info" style="margin-top:14px">${d.explanation}</div>`; if(d.parsed_filters&&Object.keys(d.parsed_filters).length) h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${Object.entries(d.parsed_filters).map(([k,v])=>`<span class="badge" style="background:rgba(139,92,246,0.1);color:var(--purple);border:1px solid rgba(139,92,246,0.2)">${k}: ${v}</span>`).join('')}</div>`; if(d.results?.length){h+=`<div class="table-wrap"><table><thead><tr>${['Key','Title','State','Priority','Assignee'].map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>`;d.results.forEach(t=>{h+=`<tr><td style="color:var(--accent);font-weight:600;font-size:12px">${t.task_key}</td><td>${t.title}</td><td>${badge(t.state,STATE_COLORS)}</td><td>${badge(t.priority,PRIORITY_COLORS)}</td><td style="color:var(--text-dim)">${t.assigned_to||'—'}</td></tr>`;});h+=`</tbody></table></div>`;}else h+=`<div class="empty-state">No matches</div>`; $('nl-result').innerHTML=h; } catch{$('nl-result').innerHTML=`<div class="msg msg-error" style="margin-top:14px">Query failed</div>`;} }

async function doScoreAll() { try { const d=await apiCall('/ai/score-all/','POST'); let h=`<div class="msg msg-success" style="margin-top:14px">${d.scored_count} scored</div><div style="max-height:200px;overflow-y:auto">`; (d.results||[]).forEach(r=>{const c=r.score>=0.7?'var(--red)':r.score>=0.4?'var(--amber)':'var(--green)';h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(30,41,59,0.03);font-size:11px"><span style="color:var(--accent)">${r.task_key}</span><span style="color:${c};font-weight:600">${(r.score*100).toFixed(0)}%</span></div>`;});h+=`</div>`;$('score-result').innerHTML=h;await loadGlobalData();}catch{$('score-result').innerHTML=`<div class="msg msg-error" style="margin-top:14px">Failed</div>`;} }

                        <span style="font-size:10px;color:var(--text-muted)">${formatDate(l.timestamp)}</span>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                    <div style="padding:10px;background:rgba(239,68,68,0.04);border-radius:6px;border:1px solid rgba(239,68,68,0.08)">

                        <div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:6px;font-weight:600">New</div>
                        <div style="font-size:11px;line-height:1.6;word-break:break-word">${newHTML}</div>

            </div>`;

        html += `</div>`;

        let comments = data.results || [];
        // Sort recent first
        comments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        let html = `<div><h2 class="page-title">COMMENTS</h2><p class="page-sub">${comments.length} comments · Click task key to view task</p></div><div class="card" style="margin-top:20px">`;
        if (!comments.length) html += `<div class="empty-state">No comments</div>`;
        else comments.forEach(c => {
            const tk = TASKS.find(t => t.id === c.task);
            html += `<div class="activity-item">
                <span style="font-size:14px">💬</span>
                <div style="flex:1">
                    <div style="display:flex;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap">
                        <span style="color:var(--accent);font-weight:600;font-size:12px;cursor:pointer;text-decoration:underline" onclick="goToTask('${c.task}')">${tk?.task_key || '—'}</span>
                        <span style="color:var(--purple);font-size:11px;font-weight:600">${c.author_name}</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-dim)">${c.content}</div>
                </div>
                <span style="color:var(--text-muted);font-size:10px;white-space:nowrap">${timeAgo(c.created_at)}</span>
            </div>`;
        });
        html += `</div>`;
        $('page-comments').innerHTML = html;
    } catch(e) { $('page-comments').innerHTML = `<div class="msg msg-error">${e.message}</div>`; }
}

</script>
</body>
</html>
